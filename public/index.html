<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NextStream</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:"Inter",sans-serif;
    background:#0b0b0f;
    color:white;
}

header{
    position:sticky;
    top:0;
    z-index:100;

    backdrop-filter:blur(18px);

    background:rgba(10,10,15,0.75);

    border-bottom:
    1px solid rgba(255,255,255,0.08);

    padding:16px 24px;

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
}

.logo{
    font-size:26px;
    font-weight:700;

    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.actions{
    display:flex;
    align-items:center;
    gap:12px;
}

.uploadBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(
        135deg,
        #7c4dff,
        #5b7cff
    );

    border:none;
    color:white;

    padding:12px 18px;

    border-radius:14px;

    font-weight:600;

    cursor:pointer;

    transition:0.2s;

    text-decoration:none;
}

.uploadBtn:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

.uploadBtn.danger{
    background:linear-gradient(135deg,#e53935,#c62828);
}

.uploadBtn.secondary{
    background:linear-gradient(135deg,#555,#777);
}

.fileInput{
    display:none;
}

.customFile{
    background:#1a1a22;

    border:
    1px solid rgba(255,255,255,0.08);

    padding:12px 16px;

    border-radius:14px;

    cursor:pointer;

    transition:0.2s;
}

.customFile:hover{
    background:#22222c;
}

.titleInput{
    background:#1a1a22;

    border:
    1px solid rgba(255,255,255,0.08);

    padding:12px 16px;

    border-radius:14px;

    color:white;

    font-family:"Inter",sans-serif;

    font-size:14px;

    outline:none;

    transition:0.2s;

    min-width:200px;
}

.titleInput::placeholder{
    color:#6c6c82;
}

.titleInput:focus{
    border-color:#7c4dff;
}

.hero{
    padding:70px 24px 40px;
}

.heroTitle{
    font-size:52px;
    font-weight:800;

    line-height:1.05;

    max-width:850px;
}

.heroTitle span{
    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.heroSub{
    margin-top:20px;
    color:#a0a0b5;
    font-size:18px;
    max-width:700px;
}

.progressWrap{
    margin-top:24px;
    width:100%;
    max-width:500px;
}

.progressBar{
    width:100%;
    height:14px;

    background:#1a1a22;

    border-radius:999px;

    overflow:hidden;
}

.progressFill{
    width:0%;
    height:100%;

    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    transition:0.2s;
}

.progressText{
    margin-top:10px;
    color:#b8b8c7;
}

#videos{
    padding:10px 24px 60px;

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(340px,1fr));

    gap:28px;
}

.card{
    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.06);

    border-radius:24px;

    overflow:hidden;

    transition:0.25s;

    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-6px);

    border-color:
    rgba(124,77,255,0.5);

    box-shadow:
    0 20px 40px rgba(0,0,0,0.35);
}

.videoWrap{
    position:relative;
    aspect-ratio:16/9;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.cardBody{
    padding:18px;
}

.videoName{
    font-size:15px;
    font-weight:600;

    line-height:1.4;

    word-break:break-word;

    cursor:pointer;
}

.videoName:hover{
    color:#b8b8ff;
}

.videoMeta{
    margin-top:10px;
    color:#8c8ca3;
    font-size:13px;
}

.channelLink{
    cursor:pointer;
    font-weight:500;
    transition:0.2s;
}

.channelLink:hover{
    color:#b8b8ff;
}

.likeBtn{
    display:inline-flex;
    align-items:center;
    gap:4px;
    background:none;
    border:none;
    color:#8c8ca3;
    cursor:pointer;
    font-size:13px;
    padding:4px 0;
    transition:0.2s;
}

.likeBtn:hover{
    color:#ff4d6d;
}

.likeBtn.liked{
    color:#ff4d6d;
}

.likeBtn svg{
    width:18px;
    height:18px;
    transition:0.2s;
}

.likeBtn.liked svg{
    fill:#ff4d6d;
}

.likeBtn:not(.liked) svg{
    fill:none;
    stroke:currentColor;
    stroke-width:2;
}

.videoTags{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.tag{
    display:inline-block;
    background:rgba(124,77,255,0.15);
    color:#b8b8ff;
    font-size:11px;
    font-weight:500;
    padding:4px 10px;
    border-radius:999px;
    cursor:pointer;
    transition:0.2s;
}

.tag:hover{
    background:rgba(124,77,255,0.3);
}

.tag.addTag{
    background:rgba(255,255,255,0.06);
    color:#8c8ca3;
    font-size:11px;
}

.tag.addTag:hover{
    background:rgba(255,255,255,0.12);
    color:#ccc;
}

.tagEditInput{
    background:#1a1a22;
    border:1px solid rgba(255,255,255,0.08);
    padding:4px 10px;
    border-radius:999px;
    color:white;
    font-family:"Inter",sans-serif;
    font-size:11px;
    outline:none;
    width:160px;
    transition:0.2s;
}

.tagEditInput:focus{
    border-color:#7c4dff;
}

.empty{
    padding:80px 20px;
    text-align:center;
    color:#88889c;
    font-size:18px;
}

.modalOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    z-index:200;
    align-items:center;
    justify-content:center;
}

.modalOverlay.active{
    display:flex;
}

.modal{
    background:#16161e;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:32px;
    width:100%;
    max-width:400px;
}

.modal h2{
    margin:0 0 20px;
    font-size:24px;
}

.modal .titleInput{
    width:100%;
    margin-bottom:12px;
    min-width:0;
}

.modal .actions{
    margin-top:20px;
    justify-content:flex-end;
}

.userMenu{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.userName{
    color:#b8b8ff;
    font-weight:600;
    font-size:14px;
}

@media(max-width:850px){

    .heroTitle{
        font-size:38px;
    }

    header{
        flex-direction:column;
        align-items:flex-start;
    }

    .actions{
        width:100%;
        flex-wrap:wrap;
    }

    .uploadBtn{
        width:100%;
    }

    .userMenu .uploadBtn{
        width:auto;
    }

    .customFile{
        width:100%;
    }

    .titleInput{
        width:100%;
        min-width:0;
    }

    .userMenu{
        width:100%;
    }
}

</style>
</head>
<body>

<header>

<div class="logo">
NextStream
</div>

<div class="actions">

<input
type="text"
id="searchInput"
class="titleInput"
placeholder="タグで検索">

<button
id="searchBtn"
class="uploadBtn"
onclick="searchVideos()">

検索

</button>

<button
id="clearSearchBtn"
class="uploadBtn secondary"
style="display:none"
onclick="clearSearch()">

× クリア

</button>

<div id="authArea">
</div>

</div>

</header>

<section class="hero">

<div class="heroTitle">

シンプルな
<span>動画共有</span>
プラットフォーム

</div>

<div class="heroSub">

シンプルな動画投稿サイト

</div>

</section>

<div id="channelHeader" style="display:none;padding:0 24px 16px">
    <button class="uploadBtn secondary" onclick="clearChannel()">← すべての動画</button>
    <h2 id="channelName" style="margin:10px 0 0;font-size:24px;font-weight:700"></h2>
</div>

<div id="videos"></div>

<div class="modalOverlay" id="authModal">

<div class="modal">

<h2 id="authModalTitle">ログイン</h2>

<input
type="text"
id="authUsername"
class="titleInput"
placeholder="ユーザー名">

<input
type="password"
id="authPassword"
class="titleInput"
placeholder="パスワード">

<div id="authError" style="color:#e53935;font-size:13px;margin-top:8px;display:none"></div>

<div class="actions">

<button
class="uploadBtn secondary"
onclick="closeAuthModal()">

キャンセル

</button>

<button
id="authSubmitBtn"
class="uploadBtn"
onclick="submitAuth()">

ログイン

</button>

</div>

<div style="margin-top:16px;text-align:center;font-size:13px;color:#8c8ca3">

<span id="authToggleText">アカウントをお持ちでない方</span>

<button
style="background:none;border:none;color:#7c4dff;cursor:pointer;font-size:13px;text-decoration:underline;padding:0;margin-left:4px"
onclick="toggleAuthMode()">

<span id="authToggleLink">新規登録</span>

</button>

</div>

</div>

</div>

<div class="modalOverlay" id="deleteModal">

<div class="modal">

<h2>アカウント削除</h2>

<p style="color:#a0a0b5;font-size:14px;margin:0 0 16px">
アカウントを削除すると、すべての動画とデータが失われます。この操作は取り消せません。
</p>

<input
type="password"
id="deletePassword"
class="titleInput"
placeholder="パスワードを入力"
style="width:100%;min-width:0">

<div id="deleteError" style="color:#e53935;font-size:13px;margin-top:8px;display:none"></div>

<div class="actions">

<button
class="uploadBtn secondary"
onclick="closeDeleteModal()">

キャンセル

</button>

<button
class="uploadBtn danger"
onclick="deleteAccount()">

削除する

</button>

</div>

</div>

</div>

<script>

let currentUser = null;
let isLoginMode = true;
let currentChannel = null;

async function checkAuth() {
    try {
        const res = await fetch("/api/me");
        const data = await res.json();
        if (data.success && data.user) {
            currentUser = data.user;
        }
    } catch (e) {
        console.error(e);
    }
    renderAuthArea();
}

function renderAuthArea() {
    const area = document.getElementById("authArea");
    if (currentUser) {
        area.innerHTML = `
            <a href="/upload.html" class="uploadBtn">＋ アップロード</a>
            <div class="userMenu">
                <span class="userName">${escapeHtml(currentUser)}</span>
                <button class="uploadBtn secondary" onclick="logout()">ログアウト</button>
                <button class="uploadBtn danger" onclick="openDeleteModal()" style="padding:8px 12px;font-size:12px">削除</button>
            </div>
        `;
    } else {
        area.innerHTML = `
            <button class="uploadBtn" onclick="openAuthModal()">ログイン</button>
        `;
    }
}

function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

function openAuthModal() {
    isLoginMode = true;
    document.getElementById("authModalTitle").textContent = "ログイン";
    document.getElementById("authSubmitBtn").textContent = "ログイン";
    document.getElementById("authToggleText").textContent = "アカウントをお持ちでない方";
    document.getElementById("authToggleLink").textContent = "新規登録";
    document.getElementById("authUsername").value = "";
    document.getElementById("authPassword").value = "";
    document.getElementById("authError").style.display = "none";
    document.getElementById("authModal").classList.add("active");
    document.getElementById("authUsername").focus();
}

function closeAuthModal() {
    document.getElementById("authModal").classList.remove("active");
}

function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    if (isLoginMode) {
        document.getElementById("authModalTitle").textContent = "ログイン";
        document.getElementById("authSubmitBtn").textContent = "ログイン";
        document.getElementById("authToggleText").textContent = "アカウントをお持ちでない方";
        document.getElementById("authToggleLink").textContent = "新規登録";
    } else {
        document.getElementById("authModalTitle").textContent = "新規登録";
        document.getElementById("authSubmitBtn").textContent = "登録";
        document.getElementById("authToggleText").textContent = "既にアカウントをお持ちの方";
        document.getElementById("authToggleLink").textContent = "ログイン";
    }
    document.getElementById("authError").style.display = "none";
}

async function submitAuth() {
    const username = document.getElementById("authUsername").value.trim();
    const password = document.getElementById("authPassword").value;
    const errorEl = document.getElementById("authError");

    if (!username || !password) {
        errorEl.textContent = "ユーザー名とパスワードを入力してください";
        errorEl.style.display = "block";
        return;
    }

    const endpoint = isLoginMode ? "/api/login" : "/api/register";

    try {
        const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
            currentUser = data.user;
            renderAuthArea();
            closeAuthModal();
        } else {
            errorEl.textContent = data.error || "エラーが発生しました";
            errorEl.style.display = "block";
        }
    } catch (e) {
        errorEl.textContent = "通信エラーが発生しました";
        errorEl.style.display = "block";
    }
}

async function logout() {
    await fetch("/api/logout", { method: "POST" });
    currentUser = null;
    renderAuthArea();
}

function openDeleteModal() {
    document.getElementById("deletePassword").value = "";
    document.getElementById("deleteError").style.display = "none";
    document.getElementById("deleteModal").classList.add("active");
}

function closeDeleteModal() {
    document.getElementById("deleteModal").classList.remove("active");
}

async function deleteAccount() {
    const password = document.getElementById("deletePassword").value;
    const errorEl = document.getElementById("deleteError");

    if (!password) {
        errorEl.textContent = "パスワードを入力してください";
        errorEl.style.display = "block";
        return;
    }

    try {
        const res = await fetch("/api/account", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (data.success) {
            currentUser = null;
            renderAuthArea();
            closeDeleteModal();
        } else {
            errorEl.textContent = data.error || "エラーが発生しました";
            errorEl.style.display = "block";
        }
    } catch (e) {
        errorEl.textContent = "通信エラーが発生しました";
        errorEl.style.display = "block";
    }
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        closeAuthModal();
        closeDeleteModal();
    }
    if (e.key === "Enter") {
        if (document.getElementById("authModal").classList.contains("active")) {
            submitAuth();
        }
    }
});

function startEditTitle(el) {

    const filename =
    el.dataset.filename;

    const current =
    el.textContent;

    const input =
    document.createElement("input");

    input.type = "text";

    input.className = "titleInput";

    input.style.width = "100%";

    input.style.padding = "6px 10px";

    input.style.fontSize = "15px";

    input.style.fontWeight = "600";

    input.value = current;

    el.textContent = "";

    el.appendChild(input);

    input.focus();

    input.select();

    async function save() {

        const val =
        input.value.trim() || current;

        if (val.length > 100) {
            alert("タイトルは100文字以内で入力してください");
            input.focus();
            return;
        }

        await fetch(
            "/video/" +
            encodeURIComponent(filename),
            {
                method:"PATCH",
                headers:{
                    "Content-Type":
                    "application/json"
                },
                body:JSON.stringify({
                    title:val
                })
            }
        );

        el.textContent = val;
    }

    input.addEventListener("blur", save);

    input.addEventListener(
        "keydown",
        function(e) {
            if (e.key === "Enter") {
                input.blur();
            }

            if (e.key === "Escape") {
                el.textContent = current;
            }
        }
    );
}

function startEditTags(el) {

    const filename =
    el.dataset.filename;

    const current =
    el.querySelector(".tag.addTag")
        ? []
        : [...el.querySelectorAll(".tag:not(.addTag)")].map(
            t => t.dataset.tag
        );

    const input =
    document.createElement("input");

    input.type = "text";

    input.className = "tagEditInput";

    input.value = current.join(", ");

    input.placeholder = "タグをカンマ区切り";

    el.innerHTML = "";

    el.appendChild(input);

    input.focus();

    input.select();

    async function save() {

        const val =
        input.value.trim();

        const tagList = val
            ? val.split(",").map(t => t.trim()).filter(Boolean)
            : [];

        if (tagList.some(t => t.length > 20)) {
            alert("各タグは20文字以内で入力してください");
            input.focus();
            return;
        }
        if (tagList.length > 10) {
            alert("タグは最大10個までです");
            input.focus();
            return;
        }

        await fetch(
            "/video/" +
            encodeURIComponent(filename),
            {
                method:"PATCH",
                headers:{
                    "Content-Type":
                    "application/json"
                },
                body:JSON.stringify({
                    tags:tagList
                })
            }
        );

        if (tagList.length) {
            el.innerHTML = tagList.map(t =>
                `<span class="tag" data-tag="${t}">${t}</span>`
            ).join("");
        } else {
            el.innerHTML =
            `<span class="tag addTag">+ タグ追加</span>`;
        }
    }

    input.addEventListener("blur", save);

    input.addEventListener(
        "keydown",
        function(e) {
            if (e.key === "Enter") {
                input.blur();
            }

            if (e.key === "Escape") {
                const currentTags = current.join(", ");
                if (currentTags) {
                    el.innerHTML = current.map(t =>
                        `<span class="tag" data-tag="${t}">${t}</span>`
                    ).join("");
                } else {
                    el.innerHTML =
                    `<span class="tag addTag">+ タグ追加</span>`;
                }
            }
        }
    );
}

async function searchVideos() {

    const q =
    document.getElementById("searchInput").value.trim();

    if (!q) {

        loadVideos();

        return;
    }

    const res =
    await fetch("/search?q=" + encodeURIComponent(q));

    const videos =
    await res.json();

    document.getElementById("searchBtn").style.display = "none";
    document.getElementById("clearSearchBtn").style.display = "";

    document.getElementById("channelHeader").style.display = "none";
    currentChannel = null;

    renderVideoList(videos, `「${q}」に一致する動画はありません`);
}

function clearSearch() {

    document.getElementById("searchInput").value = "";

    document.getElementById("searchBtn").style.display = "";
    document.getElementById("clearSearchBtn").style.display = "none";

    loadVideos();
}

function renderVideoList(videos, emptyMessage) {
    const container = document.getElementById("videos");
    container.innerHTML = "";

    if (videos.length === 0) {
        container.innerHTML = `<div class="empty">${emptyMessage}</div>`;
        return;
    }

    videos.forEach(video => {
        const div = document.createElement("div");
        div.className = "card";

        const tagsHtml = (video.tags || []).length
            ? `<div class="videoTags" data-filename="${video.name}">${
                video.tags.map(t =>
                    `<span class="tag" data-tag="${t}">${t}</span>`
                ).join("")
            }</div>`
            : `<div class="videoTags" data-filename="${video.name}"><span class="tag addTag">+ タグ追加</span></div>`;

        div.innerHTML = `
        <div class="videoWrap">
            <video
            controls
            preload="metadata"
            src="${video.url}">
            </video>
        </div>
        <div class="cardBody">
            <div class="videoName" data-filename="${video.name}">
                ${video.title}
            </div>
            ${tagsHtml}
            <div class="videoMeta">
                ${video.uploadedBy ? `<span class="channelLink">${escapeHtml(video.uploadedBy)}</span>` : "NextStream"} ·
                <button class="likeBtn${video.likedByUser ? ' liked' : ''}" data-filename="${video.name}" onclick="toggleLike(this)">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span class="likeCount">${video.likes || 0}</span>
                </button>
            </div>
        </div>
        `;

        const titleEl = div.querySelector(".videoName");
        titleEl.addEventListener("click", function() {
            startEditTitle(this);
        });

        const tagsEl = div.querySelector(".videoTags");
        tagsEl.addEventListener("click", function(e) {
            if (e.target.classList.contains("tag") && !e.target.classList.contains("addTag")) {
                return;
            }
            startEditTags(this);
        });

        const channelEl = div.querySelector(".channelLink");
        if (channelEl) {
            channelEl.addEventListener("click", function(e) {
                e.stopPropagation();
                showChannel(video.uploadedBy);
            });
        }

        container.appendChild(div);
    });
}

async function showChannel(username) {
    currentChannel = username;

    document.getElementById("searchBtn").style.display = "";
    document.getElementById("clearSearchBtn").style.display = "none";
    document.getElementById("searchInput").value = "";

    const header = document.getElementById("channelHeader");
    document.getElementById("channelName").textContent = username + " の動画";
    header.style.display = "block";

    const res = await fetch("/channel/" + encodeURIComponent(username));
    const videos = await res.json();

    renderVideoList(videos, "このチャンネルにはまだ動画がありません");
}

function clearChannel() {
    currentChannel = null;
    document.getElementById("channelHeader").style.display = "none";
    loadVideos();
}

async function loadVideos() {

    document.getElementById("channelHeader").style.display = "none";
    currentChannel = null;

    const res =
    await fetch("/list");

    const videos =
    await res.json();

    renderVideoList(videos, "まだ動画がありません");
}

async function toggleLike(btn) {
    const filename = btn.dataset.filename;
    try {
        const res = await fetch("/api/video/" + encodeURIComponent(filename) + "/like", { method: "POST" });
        const data = await res.json();
        if (data.success) {
            btn.classList.toggle("liked", data.liked);
            btn.querySelector(".likeCount").textContent = data.likes;
        }
    } catch (e) {
        console.error(e);
    }
}

checkAuth().then(() => loadVideos());

</script>
