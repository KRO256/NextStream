<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NextStream</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17"></script>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:"Inter",sans-serif;
    background:#0b0b0f;
    color:white;
}

header{
    position:sticky;
    top:0;
    z-index:100;

    backdrop-filter:blur(18px);

    background:rgba(10,10,15,0.75);

    border-bottom:
    1px solid rgba(255,255,255,0.08);

    padding:16px 24px;

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
}

.logo{
    font-size:26px;
    font-weight:700;

    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.actions{
    display:flex;
    align-items:center;
    gap:12px;
}

.uploadBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(
        135deg,
        #7c4dff,
        #5b7cff
    );

    border:none;
    color:white;

    padding:12px 18px;

    border-radius:14px;

    font-weight:600;

    cursor:pointer;

    transition:0.2s;

    text-decoration:none;
}

.uploadBtn:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

.uploadBtn.danger{
    background:linear-gradient(135deg,#e53935,#c62828);
}

.deleteVideoBtn{
    background:rgba(229,57,53,0.15);
    border:1px solid rgba(229,57,53,0.3);
    color:#ef5350;
    padding:4px 10px;
    border-radius:8px;
    font-size:11px;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
    white-space:nowrap;
    font-family:"Inter",sans-serif;
    flex-shrink:0;
}

.deleteVideoBtn:hover{
    background:rgba(229,57,53,0.3);
    border-color:#e53935;
}

.uploadBtn.secondary{
    background:linear-gradient(135deg,#555,#777);
}

.fileInput{
    display:none;
}

.customFile{
    background:#1a1a22;

    border:
    1px solid rgba(255,255,255,0.08);

    padding:12px 16px;

    border-radius:14px;

    cursor:pointer;

    transition:0.2s;
}

.customFile:hover{
    background:#22222c;
}

.titleInput{
    background:#1a1a22;

    border:
    1px solid rgba(255,255,255,0.08);

    padding:12px 16px;

    border-radius:14px;

    color:white;

    font-family:"Inter",sans-serif;

    font-size:14px;

    outline:none;

    transition:0.2s;

    min-width:200px;
}

.titleInput::placeholder{
    color:#6c6c82;
}

.titleInput:focus{
    border-color:#7c4dff;
}

.hero{
    padding:70px 24px 40px;
}

.heroTitle{
    font-size:52px;
    font-weight:800;

    line-height:1.05;

    max-width:850px;
}

.heroTitle span{
    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.heroSub{
    margin-top:20px;
    color:#a0a0b5;
    font-size:18px;
    max-width:700px;
}

.progressWrap{
    margin-top:24px;
    width:100%;
    max-width:500px;
}

.progressBar{
    width:100%;
    height:14px;

    background:#1a1a22;

    border-radius:999px;

    overflow:hidden;
}

.progressFill{
    width:0%;
    height:100%;

    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    transition:0.2s;
}

.progressText{
    margin-top:10px;
    color:#b8b8c7;
}

#videos{
    padding:10px 24px 60px;

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(340px,1fr));

    gap:28px;
}

.pagination{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:24px;
    margin-top:-40px;
}

.pageBtn{
    background:rgba(124,77,255,0.15);
    color:#fff;
    border:1px solid rgba(124,77,255,0.3);
    border-radius:10px;
    padding:8px 20px;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
}

.pageBtn:hover:not(:disabled){
    background:rgba(124,77,255,0.3);
}

.pageBtn:disabled{
    opacity:0.35;
    cursor:default;
}

.pageInfo{
    font-size:14px;
    color:rgba(255,255,255,0.6);
    min-width:100px;
    text-align:center;
}

.card{
    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.06);

    border-radius:24px;

    overflow:hidden;

    transition:0.25s;

    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-6px);

    border-color:
    rgba(124,77,255,0.5);

    box-shadow:
    0 20px 40px rgba(0,0,0,0.35);
}

.videoWrap{
    position:relative;
    aspect-ratio:16/9;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.cardBody{
    padding:18px;
}

.videoName{
    font-size:15px;
    font-weight:600;

    line-height:1.4;

    word-break:break-word;

    cursor:pointer;
}

.videoName:hover{
    color:#b8b8ff;
}

.videoMeta{
    margin-top:10px;
    color:#8c8ca3;
    font-size:13px;
}

.channelLink{
    cursor:pointer;
    font-weight:500;
    transition:0.2s;
}

.channelLink:hover{
    color:#b8b8ff;
}

.likeBtn{
    display:inline-flex;
    align-items:center;
    gap:4px;
    background:none;
    border:none;
    color:#8c8ca3;
    cursor:pointer;
    font-size:13px;
    padding:4px 0;
    transition:0.2s;
}

.likeBtn:hover{
    color:#ff4d6d;
}

.likeBtn.liked{
    color:#ff4d6d;
}

.likeBtn svg{
    width:18px;
    height:18px;
    transition:0.2s;
}

.likeBtn.liked svg{
    fill:#ff4d6d;
}

.likeBtn:not(.liked) svg{
    fill:none;
    stroke:currentColor;
    stroke-width:2;
}

.bookmarkBtn{
    display:inline-flex;
    align-items:center;
    background:none;
    border:none;
    color:#8c8ca3;
    cursor:pointer;
    padding:4px 0;
    transition:0.2s;
    margin-left:8px;
    vertical-align:middle;
}
.bookmarkBtn:hover{
    color:#ffd700;
}
.bookmarkBtn.bookmarked{
    color:#ffd700;
}
.bookmarkBtn svg{
    width:18px;
    height:18px;
}
.bookmarkBtn.bookmarked svg{
    fill:#ffd700;
}
.bookmarkBtn:not(.bookmarked) svg{
    fill:none;
    stroke:currentColor;
    stroke-width:2;
}

.tabBar{
    display:flex;
    gap:8px;
    padding:0 24px 20px;
    flex-wrap:wrap;
}

.tab{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    color:#a0a0b5;
    padding:8px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
    font-family:"Inter",sans-serif;
}

.tab:hover{
    background:rgba(124,77,255,0.15);
    border-color:rgba(124,77,255,0.3);
    color:white;
}

.tab.active{
    background:linear-gradient(135deg,#7c4dff,#5b7cff);
    border-color:transparent;
    color:white;
}

.rankBadge{
    position:absolute;
    top:10px;
    left:10px;
    background:linear-gradient(135deg,#7c4dff,#5b7cff);
    color:white;
    font-weight:700;
    font-size:15px;
    padding:4px 14px;
    border-radius:999px;
    z-index:10;
    line-height:1.3;
}

.rankBadge.gold{
    background:linear-gradient(135deg,#ffd700,#ffaa00);
    color:#1a1a2e;
}

.rankBadge.silver{
    background:linear-gradient(135deg,#c0c0c0,#a0a0a0);
    color:#1a1a2e;
}

.rankBadge.bronze{
    background:linear-gradient(135deg,#cd7f32,#b8860b);
    color:white;
}

.rankingViews{
    color:#7c4dff;
    font-weight:600;
}

.commentsSection{
    margin-top:16px;
    border-top:1px solid rgba(255,255,255,0.06);
    padding-top:14px;
}

.commentsSection summary{
    cursor:pointer;
    color:#8c8ca3;
    font-size:13px;
    font-weight:500;
    padding:4px 0;
    user-select:none;
}

.commentsSection summary:hover{
    color:#b8b8ff;
}

.commentList{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:300px;
    overflow-y:auto;
}

.commentItem{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:12px;
    padding:10px 12px;
    font-size:13px;
}

.commentAuthor{
    font-weight:600;
    color:#b8b8ff;
    font-size:12px;
    margin-bottom:4px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.commentDeleteBtn{
    background:none;
    border:none;
    color:#e53935;
    cursor:pointer;
    font-size:11px;
    padding:0;
    opacity:0.5;
    transition:0.2s;
}

.commentDeleteBtn:hover{
    opacity:1;
}

.commentText{
    color:#d0d0e0;
    line-height:1.4;
    word-break:break-word;
}

.commentForm{
    display:flex;
    gap:8px;
    margin-top:12px;
}

.commentInput{
    flex:1;
    background:#1a1a22;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:8px 12px;
    color:white;
    font-family:"Inter",sans-serif;
    font-size:13px;
    outline:none;
    resize:none;
    transition:0.2s;
    min-height:36px;
}

.commentInput:focus{
    border-color:#7c4dff;
}

.commentSubmitBtn{
    background:linear-gradient(135deg,#7c4dff,#5b7cff);
    border:none;
    color:white;
    padding:8px 14px;
    border-radius:12px;
    font-weight:500;
    font-size:13px;
    cursor:pointer;
    transition:0.2s;
    font-family:"Inter",sans-serif;
    white-space:nowrap;
}

.commentSubmitBtn:hover{
    opacity:0.9;
}

.commentCharCount{
    font-size:11px;
    color:#6c6c82;
    align-self:flex-end;
    flex-shrink:0;
}

.commentCharCount.over{
    color:#e53935;
}

.commentEmpty{
    color:#6c6c82;
    font-size:13px;
}

.heroRanking{
    font-size:28px;
    font-weight:700;
    margin-bottom:8px;
}

.heroRanking span{
    background:linear-gradient(90deg,#7c4dff,#00d4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.videoTags{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.tag{
    display:inline-block;
    background:rgba(124,77,255,0.15);
    color:#b8b8ff;
    font-size:11px;
    font-weight:500;
    padding:4px 10px;
    border-radius:999px;
    cursor:pointer;
    transition:0.2s;
}

.tag:hover{
    background:rgba(124,77,255,0.3);
}

.tag.addTag{
    background:rgba(255,255,255,0.06);
    color:#8c8ca3;
    font-size:11px;
}

.tag.addTag:hover{
    background:rgba(255,255,255,0.12);
    color:#ccc;
}

.tagEditInput{
    background:#1a1a22;
    border:1px solid rgba(255,255,255,0.08);
    padding:4px 10px;
    border-radius:999px;
    color:white;
    font-family:"Inter",sans-serif;
    font-size:11px;
    outline:none;
    width:160px;
    transition:0.2s;
}

.tagEditInput:focus{
    border-color:#7c4dff;
}

.empty{
    padding:80px 20px;
    text-align:center;
    color:#88889c;
    font-size:18px;
}

.modalOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    z-index:200;
    align-items:center;
    justify-content:center;
}

.modalOverlay.active{
    display:flex;
}

.modal{
    background:#16161e;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:32px;
    width:100%;
    max-width:400px;
}

.modal h2{
    margin:0 0 20px;
    font-size:24px;
}

.modal .titleInput{
    width:100%;
    margin-bottom:12px;
    min-width:0;
}

.modal .actions{
    margin-top:20px;
    justify-content:flex-end;
}

.userMenu{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.userName{
    color:#b8b8ff;
    font-weight:600;
    font-size:14px;
}

#videoPage{
    display:none;
    padding:24px;
    max-width:1100px;
    margin:0 auto;
}

#videoPage.active{
    display:block;
}

#videoPage .backBtn{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    color:#a0a0b5;
    padding:8px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
    font-family:"Inter",sans-serif;
    margin-bottom:20px;
}

#videoPage .backBtn:hover{
    background:rgba(124,77,255,0.15);
    border-color:rgba(124,77,255,0.3);
    color:white;
}

#videoPage .playerWrap{
    width:100%;
    aspect-ratio:16/9;
    background:black;
    border-radius:16px;
    overflow:hidden;
}

#videoPage .playerWrap video{
    width:100%;
    height:100%;
    object-fit:contain;
}

#videoPage .videoInfo{
    margin-top:20px;
}

#videoPage .videoTitle{
    font-size:24px;
    font-weight:700;
    line-height:1.3;
    word-break:break-word;
}

#videoPage .videoTitleEditBtn{
    background:none;
    border:none;
    color:#7c4dff;
    cursor:pointer;
    font-size:14px;
    margin-left:10px;
    padding:4px 8px;
    border-radius:6px;
    transition:0.2s;
    vertical-align:middle;
}

#videoPage .videoTitleEditBtn:hover{
    background:rgba(124,77,255,0.15);
}

#videoPage .videoMeta{
    display:flex;
    align-items:center;
    gap:16px;
    margin-top:12px;
    color:#8c8ca3;
    font-size:14px;
    flex-wrap:wrap;
}

#videoPage .videoMeta .channelLink{
    font-weight:600;
    color:#b8b8ff;
}

#videoPage .videoActions{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:16px;
    flex-wrap:wrap;
}

#videoPage .videoActions button{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    color:#a0a0b5;
    padding:8px 16px;
    border-radius:999px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
    font-family:"Inter",sans-serif;
}

#videoPage .videoActions button:hover{
    background:rgba(124,77,255,0.15);
    border-color:rgba(124,77,255,0.3);
    color:white;
}

#videoPage .videoActions button.liked{
    color:#ff4d6d;
    border-color:rgba(255,77,109,0.3);
    background:rgba(255,77,109,0.1);
}

#videoPage .videoActions button.liked:hover{
    background:rgba(255,77,109,0.2);
}

#videoPage .videoActions button.bookmarked{
    color:#ffd700;
    border-color:rgba(255,215,0,0.3);
    background:rgba(255,215,0,0.1);
}

#videoPage .videoActions button.bookmarked:hover{
    background:rgba(255,215,0,0.2);
}

#videoPage .videoActions button svg{
    width:18px;
    height:18px;
}

#videoPage .videoActions button.liked svg{
    fill:#ff4d6d;
}

#videoPage .videoActions button:not(.liked) svg{
    fill:none;
    stroke:currentColor;
    stroke-width:2;
}

#videoPage .videoActions button.bookmarked svg{
    fill:#ffd700;
}

#videoPage .videoActions button:not(.bookmarked) svg{
    fill:none;
    stroke:currentColor;
    stroke-width:2;
}

#videoPage .videoTags{
    margin-top:16px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

#videoPage .commentsSection{
    margin-top:24px;
    border-top:1px solid rgba(255,255,255,0.08);
    padding-top:20px;
}

#videoPage .commentsSection h3{
    font-size:16px;
    font-weight:600;
    margin:0 0 16px;
    color:#d0d0e0;
}

#videoPage .commentList{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:400px;
    overflow-y:auto;
}

#videoPage .commentList .commentEmpty{
    color:#6c6c82;
    font-size:14px;
}

#videoPage .commentForm{
    display:flex;
    gap:8px;
    margin-top:16px;
}

#videoPage .commentForm .commentInput{
    flex:1;
    background:#1a1a22;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:10px 14px;
    color:white;
    font-family:"Inter",sans-serif;
    font-size:14px;
    outline:none;
    resize:none;
    transition:0.2s;
    min-height:40px;
}

#videoPage .commentForm .commentInput:focus{
    border-color:#7c4dff;
}

#videoPage .commentForm .commentSubmitBtn{
    background:linear-gradient(135deg,#7c4dff,#5b7cff);
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:12px;
    font-weight:500;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
    font-family:"Inter",sans-serif;
    white-space:nowrap;
}

#videoPage .commentForm .commentSubmitBtn:hover{
    opacity:0.9;
}

#videoPage .commentForm .commentCharCount{
    font-size:12px;
    color:#6c6c82;
    align-self:flex-end;
    flex-shrink:0;
}

#videoPage .commentForm .commentCharCount.over{
    color:#e53935;
}

@media(max-width:850px){

    .heroTitle{
        font-size:38px;
    }

    header{
        flex-direction:column;
        align-items:flex-start;
    }

    .actions{
        width:100%;
        flex-wrap:wrap;
    }

    .uploadBtn{
        width:100%;
    }

    .userMenu .uploadBtn{
        width:auto;
    }

    .customFile{
        width:100%;
    }

    .titleInput{
        width:100%;
        min-width:0;
    }

    .userMenu{
        width:100%;
    }
}

</style>
</head>
<body>

<header>

<div class="logo" onclick="showAllVideos()" style="cursor:pointer">
NextStream
</div>

<div class="actions">

<button
id="bookmarkBtn"
class="uploadBtn secondary"
onclick="currentPage=1;showBookmarks()"
style="display:none">

☆ ブックマーク

</button>

<input
type="text"
id="searchInput"
class="titleInput"
placeholder="タグで検索">

<button
id="searchBtn"
class="uploadBtn"
onclick="currentPage=1;searchVideos()">

検索

</button>

<button
id="clearSearchBtn"
class="uploadBtn secondary"
style="display:none"
onclick="clearSearch()">

× クリア

</button>

<div id="authArea">
</div>

</div>

</header>

<section class="hero">

<div class="heroTitle">

音楽専用の
<span>動画共有</span>
プラットフォーム

</div>

<div class="heroSub">

初心者からプロまで大歓迎。あなたの音楽を世界に届けよう。

</div>

</section>

<div id="channelHeader" style="display:none;padding:0 24px 16px">
    <button class="uploadBtn secondary" onclick="clearChannel()">← すべての動画</button>
    <div style="display:flex;align-items:center;gap:16px;margin-top:10px;flex-wrap:wrap">
        <h2 id="channelName" style="margin:0;font-size:24px;font-weight:700"></h2>
        <button id="subscribeBtn" class="uploadBtn" style="display:none;padding:8px 18px;font-size:14px" onclick="toggleSubscribe()"></button>
        <span id="subscriberCount" style="color:#8c8ca3;font-size:14px"></span>
    </div>
</div>

<div class="tabBar" id="tabBar">
    <button class="tab active" data-view="all" onclick="showAllVideos()">すべて</button>
    <button class="tab" data-view="ranking" data-period="all" onclick="currentPage=1;showRanking('all')">全期間</button>

    <button class="tab" data-view="ranking" data-period="year" onclick="currentPage=1;showRanking('year')">１年</button>

<script>

let currentUser = null;
let csrfToken = null;
let isLoginMode = true;
let currentChannel = null;
let currentPage = 1;
let totalPages = 1;
let currentView = 'all'; // 'all' | 'channel' | 'search' | 'ranking' | 'bookmarks'
let currentSearchQuery = '';

function csrfFetch(url, options = {}) {
    const method = (options.method || "GET").toUpperCase();
    if (["POST", "PUT", "PATCH", "DELETE"].includes(method) && csrfToken) {
        options.headers = { ...options.headers, "X-CSRF-Token": csrfToken };
    }
    return fetch(url, options);
}

async function checkAuth() {
    try {
        const res = await fetch("/api/me");
        const data = await res.json();
        if (data.success && data.user) {
            currentUser = data.user;
        }
        csrfToken = data.csrfToken || null;
    } catch (e) {
        console.error(e);
    }
    renderAuthArea();
}

function renderAuthArea() {
    const area = document.getElementById("authArea");
    const bookmarkBtn = document.getElementById("bookmarkBtn");
    if (currentUser) {
        bookmarkBtn.style.display = "";
        area.innerHTML = `
            <a href="/upload.html" class="uploadBtn">＋ アップロード</a>
            <div class="userMenu">
                <span class="userName">${escapeHtml(currentUser)}</span>
                <button class="uploadBtn secondary" onclick="logout()">ログアウト</button>
                <button class="uploadBtn danger" onclick="openDeleteModal()" style="padding:8px 12px;font-size:12px">削除</button>
            </div>
        `;
    } else {
        bookmarkBtn.style.display = "none";
        area.innerHTML = `
            <button class="uploadBtn" onclick="openAuthModal()">ログイン</button>
        `;
    }
}

function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

function openAuthModal() {
    isLoginMode = true;
    document.getElementById("authModalTitle").textContent = "ログイン";
    document.getElementById("authSubmitBtn").textContent = "ログイン";
    document.getElementById("authToggleText").textContent = "アカウントをお持ちでない方";
    document.getElementById("authToggleLink").textContent = "新規登録";
    document.getElementById("authUsername").value = "";
    document.getElementById("authPassword").value = "";
    document.getElementById("authError").style.display = "none";
    document.getElementById("authModal").classList.add("active");
    document.getElementById("authUsername").focus();
}

function closeAuthModal() {
    document.getElementById("authModal").classList.remove("active");
}

function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    if (isLoginMode) {
        document.getElementById("authModalTitle").textContent = "ログイン";
        document.getElementById("authSubmitBtn").textContent = "ログイン";
        document.getElementById("authToggleText").textContent = "アカウントをお持ちでない方";
        document.getElementById("authToggleLink").textContent = "新規登録";
    } else {
        document.getElementById("authModalTitle").textContent = "新規登録";
        document.getElementById("authSubmitBtn").textContent = "登録";
        document.getElementById("authToggleText").textContent = "既にアカウントをお持ちの方";
        document.getElementById("authToggleLink").textContent = "ログイン";
    }
    document.getElementById("authError").style.display = "none";
}

async function submitAuth() {
    const username = document.getElementById("authUsername").value.trim();
    const password = document.getElementById("authPassword").value;
    const errorEl = document.getElementById("authError");

    if (!username || !password) {
        errorEl.textContent = "ユーザー名とパスワードを入力してください";
        errorEl.style.display = "block";
        return;
    }

    const endpoint = isLoginMode ? "/api/login" : "/api/register";

    try {
        const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
            currentUser = data.user;
            csrfToken = data.csrfToken || null;
            renderAuthArea();
            closeAuthModal();
        } else {
            errorEl.textContent = data.error || "エラーが発生しました";
            errorEl.style.display = "block";
        }
    } catch (e) {
        errorEl.textContent = "通信エラーが発生しました";
        errorEl.style.display = "block";
    }
}

async function logout() {
    await csrfFetch("/api/logout", { method: "POST" });
    currentUser = null;
    csrfToken = null;
    renderAuthArea();
}

function openDeleteModal() {
    document.getElementById("deletePassword").value = "";
    document.getElementById("deleteError").style.display = "none";
    document.getElementById("deleteModal").classList.add("active");
}

function closeDeleteModal() {
    document.getElementById("deleteModal").classList.remove("active");
}

async function deleteAccount() {
    const password = document.getElementById("deletePassword").value;
    const errorEl = document.getElementById("deleteError");

    if (!password) {
        errorEl.textContent = "パスワードを入力してください";
        errorEl.style.display = "block";
        return;
    }

    try {
        const res = await csrfFetch("/api/account", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (data.success) {
            currentUser = null;
            renderAuthArea();
            closeDeleteModal();
        } else {
            errorEl.textContent = data.error || "エラーが発生しました";
            errorEl.style.display = "block";
        }
    } catch (e) {
        errorEl.textContent = "通信エラーが発生しました";
        errorEl.style.display = "block";
    }
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        closeAuthModal();
        closeDeleteModal();
    }
    if (e.key === "Enter") {
        if (document.getElementById("authModal").classList.contains("active")) {
            submitAuth();
        }
    }
});

function startEditTags(el) {

    const filename =
    el.dataset.filename;

    const current =
    el.querySelector(".tag.addTag")
        ? []
        : [...el.querySelectorAll(".tag:not(.addTag)")].map(
            t => t.dataset.tag
        );

    const input =
    document.createElement("input");

    input.type = "text";

    input.className = "tagEditInput";

    input.value = current.join(", ");

    input.placeholder = "タグをカンマ区切り";

    el.innerHTML = "";

    el.appendChild(input);

    input.focus();

    input.select();

    async function save() {

        const val =
        input.value.trim();

        const tagList = val
            ? val.split(",").map(t => t.trim()).filter(Boolean)
            : [];

        if (tagList.some(t => t.length > 20)) {
            alert("各タグは20文字以内で入力してください");
            input.focus();
            return;
        }
        if (tagList.length > 10) {
            alert("タグは最大10個までです");
            input.focus();
            return;
        }

        await csrfFetch(
            "/video/" +
            encodeURIComponent(filename),
            {
                method:"PATCH",
                headers:{
                    "Content-Type":
                    "application/json"
                },
                body:JSON.stringify({
                    tags:tagList
                })
            }
        );

        if (tagList.length) {
            el.innerHTML = tagList.map(t =>
                `<span class="tag" data-tag="${t}">${t}</span>`
            ).join("");
        } else {
            el.innerHTML =
            `<span class="tag addTag">+ タグ追加</span>`;
        }
    }

    input.addEventListener("blur", save);

    input.addEventListener(
        "keydown",
        function(e) {
            if (e.key === "Enter") {
                input.blur();
            }

            if (e.key === "Escape") {
                const currentTags = current.join(", ");
                if (currentTags) {
                    el.innerHTML = current.map(t =>
                        `<span class="tag" data-tag="${t}">${t}</span>`
                    ).join("");
                } else {
                    el.innerHTML =
                    `<span class="tag addTag">+ タグ追加</span>`;
                }
            }
        }
    );
}

async function searchVideos() {
    document.getElementById("videoPage").classList.remove("active");
    document.getElementById("videos").style.display = "";
    document.querySelector(".hero").style.display = "";
    document.getElementById("tabBar").style.display = "";
    const pag = document.getElementById("pagination");
    if (pag) pag.style.display = "";
    currentView = 'search';

    const q =
    document.getElementById("searchInput").value.trim();

    if (!q) {
        loadVideos();
        return;
    }

    currentSearchQuery = q;

    const res =
    await fetch(`/search?q=${encodeURIComponent(q)}&page=${currentPage}&limit=30`);

    const data =
    await res.json();

    currentPage = data.page;
    totalPages = data.totalPages;

    document.getElementById("searchBtn").style.display = "none";
    document.getElementById("clearSearchBtn").style.display = "";

    document.getElementById("channelHeader").style.display = "none";
    currentChannel = null;

    currentPeriod = null;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelector('.tab[data-view="all"]').classList.add("active");

    renderVideoList(data.videos, `「${q}」に一致する動画はありません`);
}

function clearSearch() {

    document.getElementById("searchInput").value = "";

    document.getElementById("searchBtn").style.display = "";
    document.getElementById("clearSearchBtn").style.display = "none";

    showAllVideos();
}

function renderVideoList(videos, emptyMessage, showRank) {
    const container = document.getElementById("videos");
    container.innerHTML = "";

    if (videos.length === 0) {
        container.innerHTML = `<div class="empty">${emptyMessage}</div>`;
        updatePagination();
        return;
    }

    videos.forEach((video, index) => {
        const div = document.createElement("div");
        div.className = "card";

        const tagsHtml = (video.tags || []).length
            ? `<div class="videoTags" data-filename="${video.name}">${
                video.tags.map(t =>
                    `<span class="tag" data-tag="${t}">${t}</span>`
                ).join("")
            }</div>`
            : `<div class="videoTags" data-filename="${video.name}"><span class="tag addTag">+ タグ追加</span></div>`;

        const rankHtml = showRank
            ? `<div class="rankBadge${index === 0 ? ' gold' : index === 1 ? ' silver' : index === 2 ? ' bronze' : ''}">#${index + 1}</div>`
            : "";

        div.innerHTML = `
        <div class="videoWrap">
            ${rankHtml}
            <video
            controls
            preload="metadata"
            data-url="${video.url}">
            </video>
        </div>
        <div class="cardBody">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
                <div class="videoName" data-filename="${video.name}" style="flex:1">
                    ${video.title}
                </div>
                ${currentUser === video.uploadedBy ? `<button class="deleteVideoBtn" data-filename="${video.name}" onclick="deleteVideo(this)">🗑 削除</button>` : ""}
            </div>
            ${tagsHtml}
            <div class="videoMeta">
                ${video.uploadedBy ? `<span class="channelLink">${escapeHtml(video.uploadedBy)}</span>` : "NextStream"} ·
                <span class="viewCount ${showRank ? 'rankingViews' : ''}">${video.views || 0} 回視聴</span> ·
                <button class="likeBtn${video.likedByUser ? ' liked' : ''}" data-filename="${video.name}" onclick="toggleLike(this)">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span class="likeCount">${video.likes || 0}</span>
                </button>
                <button class="bookmarkBtn${video.bookmarkedByUser ? ' bookmarked' : ''}" data-filename="${video.name}" onclick="toggleBookmark(this)">
                    <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
                </button>
            </div>
            <details class="commentsSection" data-filename="${video.name}">
                <summary>コメントを見る</summary>
                <div class="commentList"></div>
                <div class="commentForm">
                    <textarea class="commentInput" placeholder="コメントを入力..." rows="1" maxlength="500"></textarea>
                    <button class="commentSubmitBtn" onclick="postComment(this)">投稿</button>
                    <span class="commentCharCount">0/500</span>
                </div>
            </details>
        </div>
        `;

        const titleEl = div.querySelector(".videoName");
        titleEl.addEventListener("click", function(e) {
            e.stopPropagation();
            navigateToVideo(video.name);
        });

        const tagsEl = div.querySelector(".videoTags");
        tagsEl.addEventListener("click", function(e) {
            if (e.target.classList.contains("tag") && !e.target.classList.contains("addTag")) {
                return;
            }
            startEditTags(this);
        });

        const channelEl = div.querySelector(".channelLink");
        if (channelEl) {
            channelEl.addEventListener("click", function(e) {
                e.stopPropagation();
                currentPage = 1;
                showChannel(video.uploadedBy);
            });
        }

        const detailsEl = div.querySelector(".commentsSection");
        detailsEl.addEventListener("toggle", function() {
            if (this.open && !this.dataset.loaded) {
                this.dataset.loaded = "true";
                loadComments(this);
            }
        });

        const commentInput = detailsEl.querySelector(".commentInput");
        const counterEl = detailsEl.querySelector(".commentCharCount");
        commentInput.addEventListener("input", function() {
            counterEl.textContent = this.value.length + "/500";
            counterEl.classList.toggle("over", this.value.length >= 500);
        });
        commentInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                postComment(this.nextElementSibling);
            }
        });

        const videoEl = div.querySelector("video");
        const videoUrl = videoEl.dataset.url;
        if (videoUrl.endsWith(".m3u8")) {
            if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
                videoEl.src = videoUrl;
            } else if (window.Hls && Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(videoUrl);
                hls.attachMedia(videoEl);
            } else {
                videoEl.src = videoUrl;
            }
        } else {
            videoEl.src = videoUrl;
        }
        let viewCounted = false;
        videoEl.addEventListener("play", async function() {
            if (viewCounted) return;
            viewCounted = true;
            try {
                const period = currentPeriod;
                const url = "/api/video/" + encodeURIComponent(video.name) + "/view" + (period ? "?period=" + period : "");
                const res = await csrfFetch(url, { method: "POST" });
                const data = await res.json();
                if (data.success) {
                    const viewEl = div.querySelector(".viewCount");
                    if (viewEl) {
                        const displayViews = data.periodViews != null ? data.periodViews : data.views;
                        viewEl.textContent = displayViews + " 回視聴";
                    }
                }
            } catch (e) {
                console.error(e);
            }
        });

        container.appendChild(div);
    });

    updatePagination();
}

function updatePagination() {
    const existing = document.getElementById("pagination");
    if (existing) existing.remove();

    if (totalPages <= 1) return;

    const nav = document.createElement("div");
    nav.id = "pagination";
    nav.className = "pagination";

    const prevBtn = document.createElement("button");
    prevBtn.className = "pageBtn";
    prevBtn.textContent = "← 前へ";
    prevBtn.disabled = currentPage <= 1;
    prevBtn.onclick = () => goToPage(currentPage - 1);

    const info = document.createElement("span");
    info.className = "pageInfo";
    info.textContent = currentPage + " / " + totalPages;

    const nextBtn = document.createElement("button");
    nextBtn.className = "pageBtn";
    nextBtn.textContent = "次へ →";
    nextBtn.disabled = currentPage >= totalPages;
    nextBtn.onclick = () => goToPage(currentPage + 1);

    nav.appendChild(prevBtn);
    nav.appendChild(info);
    nav.appendChild(nextBtn);

    const videosEl = document.getElementById("videos");
    videosEl.parentNode.insertBefore(nav, videosEl.nextSibling);
}

async function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;

    switch (currentView) {
        case 'all':
            await loadVideos();
            break;
        case 'channel':
            await showChannel(currentChannel);
            break;
        case 'search':
            await searchVideos();
            break;
        case 'ranking':
            await showRanking(currentPeriod);
            break;
        case 'bookmarks':
            await showBookmarks();
            break;
    }
}

async function showChannel(username) {
    document.getElementById("videoPage").classList.remove("active");
    currentChannel = username;
    currentView = 'channel';

    document.getElementById("searchBtn").style.display = "";
    document.getElementById("clearSearchBtn").style.display = "none";
    document.getElementById("searchInput").value = "";

    currentPeriod = null;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelector('.tab[data-view="all"]').classList.add("active");

    const header = document.getElementById("channelHeader");
    document.getElementById("channelName").textContent = username + " の動画";
    header.style.display = "block";
    document.getElementById("tabBar").style.display = "";
    document.getElementById("videos").style.display = "";
    document.querySelector(".hero").style.display = "";

    const [videosRes, subsRes] = await Promise.all([
        fetch(`/channel/${encodeURIComponent(username)}?page=${currentPage}&limit=30`),
        fetch("/api/channel/" + encodeURIComponent(username) + "/subscribers")
    ]);
    const data = await videosRes.json();
    const subsData = await subsRes.json();

    currentPage = data.page;
    totalPages = data.totalPages;

    renderVideoList(data.videos, "このチャンネルにはまだ動画がありません");
    updateSubscribeButton(username, subsData);
}

function updateSubscribeButton(channel, subsData) {
    const btn = document.getElementById("subscribeBtn");
    const countEl = document.getElementById("subscriberCount");

    countEl.textContent = subsData.subscribers + " 人の登録者";

    if (!currentUser || channel === currentUser) {
        btn.style.display = "none";
        return;
    }

    btn.style.display = "";
    btn.textContent = subsData.subscribed ? "登録中" : "登録";
    btn.className = "uploadBtn" + (subsData.subscribed ? " secondary" : "");
    btn.dataset.channel = channel;
    btn.dataset.subscribed = subsData.subscribed;
}

async function toggleSubscribe() {
    const btn = document.getElementById("subscribeBtn");
    const channel = btn.dataset.channel;

    try {
        const res = await csrfFetch("/api/channel/" + encodeURIComponent(channel) + "/subscribe", { method: "POST" });
        const data = await res.json();
        if (data.success) {
            updateSubscribeButton(channel, { subscribers: data.subscribers, subscribed: data.subscribed });
        }
    } catch (e) {
        console.error(e);
    }
}

function clearChannel() {
    currentChannel = null;
    document.getElementById("channelHeader").style.display = "none";
    showAllVideos();
}

async function loadVideos() {

    document.getElementById("channelHeader").style.display = "none";
    currentChannel = null;
    currentView = 'all';

    const res =
    await fetch(`/list?page=${currentPage}&limit=30`);

    const data =
    await res.json();

    currentPage = data.page;
    totalPages = data.totalPages;

    renderVideoList(data.videos, "まだ動画がありません");
}

async function loadComments(detailsEl) {
    const filename = detailsEl.dataset.filename;
    const listEl = detailsEl.querySelector(".commentList");
    try {
        const res = await fetch("/api/video/" + encodeURIComponent(filename) + "/comments");
        const data = await res.json();
        if (data.success) {
            renderComments(listEl, data.comments, filename);
        }
    } catch (e) {
        console.error(e);
    }
}

function renderComments(listEl, comments, filename) {
    if (comments.length === 0) {
        listEl.innerHTML = '<div class="commentEmpty">コメントはまだありません</div>';
        return;
    }
    listEl.innerHTML = comments.map(c => `
        <div class="commentItem">
            <div class="commentAuthor">
                <span>${escapeHtml(c.username)}</span>
                ${currentUser === c.username ? `<button class="commentDeleteBtn" onclick="deleteComment('${filename}', '${c.id}', this)">削除</button>` : ""}
            </div>
            <div class="commentText">${escapeHtml(c.text)}</div>
        </div>
    `).join("");
}

async function postComment(btn) {
    const detailsEl = btn.closest(".commentsSection");
    const input = detailsEl.querySelector(".commentInput");
    const text = input.value.trim();
    if (!text) return;
    if (text.length > 500) {
        alert("コメントは500文字以内で入力してください");
        return;
    }

    if (!currentUser) {
        openAuthModal();
        return;
    }

    const filename = detailsEl.dataset.filename;
    btn.disabled = true;
    btn.textContent = "投稿中...";

    try {
        const res = await csrfFetch("/api/video/" + encodeURIComponent(filename) + "/comment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (data.success) {
            input.value = "";
            const counterEl = detailsEl.querySelector(".commentCharCount");
            counterEl.textContent = "0/500";
            counterEl.classList.remove("over");
            const listEl = detailsEl.querySelector(".commentList");
            const emptyEl = listEl.querySelector(".commentEmpty");
            if (emptyEl) {
                listEl.innerHTML = "";
            }
            listEl.insertAdjacentHTML("beforeend", `
                <div class="commentItem">
                    <div class="commentAuthor">
                        <span>${escapeHtml(data.comment.username)}</span>
                        <button class="commentDeleteBtn" onclick="deleteComment('${filename}', '${data.comment.id}', this)">削除</button>
                    </div>
                    <div class="commentText">${escapeHtml(data.comment.text)}</div>
                </div>
            `);
        } else {
            alert(data.error || "エラーが発生しました");
        }
    } catch (e) {
        console.error(e);
        alert("通信エラーが発生しました");
    }
    btn.disabled = false;
    btn.textContent = "投稿";
}

// --- Video detail page & routing ---

let videoDetailData = null;

function getFilenameFromPath() {
    const match = window.location.pathname.match(/\/watch\/(.+)/);
    return match ? decodeURIComponent(match[1]) : null;
}

function setupHls(videoEl, url) {
    if (url.endsWith(".m3u8")) {
        if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
            videoEl.src = url;
        } else if (window.Hls && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(videoEl);
        } else {
            videoEl.src = url;
        }
    } else {
        videoEl.src = url;
    }
}

function navigateToVideo(filename) {
    const prevState = {
        view: currentView,
        page: currentPage,
        totalPages: totalPages,
        channel: currentChannel,
        searchQuery: currentSearchQuery,
        period: currentPeriod,
        scrollY: window.scrollY
    };
    history.pushState({ view: "video", prevState, filename }, "", "/watch/" + encodeURIComponent(filename));
    showVideoByFilename(filename);
}

async function showVideoByFilename(filename) {
    document.querySelector(".hero").style.display = "none";
    document.getElementById("tabBar").style.display = "none";
    document.getElementById("channelHeader").style.display = "none";
    document.getElementById("videos").style.display = "none";
    const pag = document.getElementById("pagination");
    if (pag) pag.style.display = "none";

    document.getElementById("videoPage").classList.add("active");
    window.scrollTo(0, 0);

    document.querySelector("#videoPage .playerWrap").innerHTML = '<video id="videoPlayer" controls preload="metadata"></video>';
    document.getElementById("videoTitle").textContent = "読み込み中...";

    try {
        const res = await fetch("/api/video/" + encodeURIComponent(filename));
        const data = await res.json();
        if (data.success) {
            renderVideoDetail(data.video);
        } else {
            document.getElementById("videoTitle").textContent = "動画が見つかりません";
        }
    } catch (e) {
        console.error(e);
        document.getElementById("videoTitle").textContent = "読み込みエラー";
    }
}

function renderVideoDetail(video) {
    videoDetailData = video;
    document.getElementById("videoTitle").textContent = video.title;

    const videoEl = document.getElementById("videoPlayer");
    setupHls(videoEl, video.url);

    let viewCounted = false;
    videoEl.addEventListener("play", async function() {
        if (viewCounted) return;
        viewCounted = true;
        try {
            const res = await csrfFetch("/api/video/" + encodeURIComponent(video.name) + "/view", { method: "POST" });
            const viewData = await res.json();
            if (viewData.success) {
                const viewEl = document.querySelector("#videoMeta .viewCount");
                if (viewEl) viewEl.textContent = viewData.views + " 回視聴";
            }
        } catch (e) { console.error(e); }
    });

    const tagsContainer = document.getElementById("videoPageTags");
    if (video.tags && video.tags.length) {
        tagsContainer.innerHTML = video.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("");
        tagsContainer.querySelectorAll(".tag").forEach(el => {
            el.addEventListener("click", function() {
                document.getElementById("searchInput").value = this.textContent;
                currentPage = 1;
                currentSearchQuery = this.textContent;
                searchVideos();
            });
        });
    } else {
        tagsContainer.innerHTML = "";
    }

    document.getElementById("videoMeta").innerHTML =
        (video.uploadedBy
            ? '<span class="channelLink" style="cursor:pointer;font-weight:600;color:#b8b8ff">' + escapeHtml(video.uploadedBy) + '</span>'
            : "NextStream") +
        ' · <span class="viewCount">' + video.views + ' 回視聴</span>';
    const chLink = document.querySelector("#videoMeta .channelLink");
    if (chLink) {
        chLink.addEventListener("click", function() {
            currentPage = 1;
            showChannel(video.uploadedBy);
        });
    }

    const likeIcon = '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
    const bookmarkIcon = '<svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>';

    let actionsHtml =
        '<button class="likeBtn' + (video.likedByUser ? ' liked' : '') + '" onclick="toggleVideoLike()">' +
            likeIcon + ' <span id="videoLikeCount">' + video.likes + '</span></button>' +
        '<button class="bookmarkBtn' + (video.bookmarkedByUser ? ' bookmarked' : '') + '" onclick="toggleVideoBookmark()">' +
            bookmarkIcon + '</button>';
    if (currentUser === video.uploadedBy) {
        actionsHtml += '<button onclick="editVideoTitle()" title="タイトルを編集">✏️ 編集</button>';
        actionsHtml += '<button class="deleteVideoBtn" onclick="deleteVideoFromPage()" style="background:rgba(229,57,53,0.15);border:1px solid rgba(229,57,53,0.3);color:#ef5350">🗑 削除</button>';
    }
    document.getElementById("videoActions").innerHTML = actionsHtml;

    loadVideoPageComments(video.name);
}

async function loadVideoPageComments(filename) {
    const listEl = document.getElementById("videoCommentList");
    try {
        const res = await fetch("/api/video/" + encodeURIComponent(filename) + "/comments");
        const data = await res.json();
        if (data.success) {
            if (data.comments.length === 0) {
                listEl.innerHTML = '<div class="commentEmpty">コメントはまだありません</div>';
            } else {
                listEl.innerHTML = data.comments.map(c =>
                    '<div class="commentItem">' +
                        '<div class="commentAuthor">' +
                            '<span>' + escapeHtml(c.username) + '</span>' +
                            (currentUser === c.username
                                ? '<button class="commentDeleteBtn" onclick="deleteVideoPageComment(\'' + filename + "', '" + c.id + "', this)\">削除</button>"
                                : "") +
                        '</div>' +
                        '<div class="commentText">' + escapeHtml(c.text) + '</div>' +
                    '</div>'
                ).join("");
            }
        }
    } catch (e) { console.error(e); }
}

async function postVideoPageComment() {
    const input = document.getElementById("videoCommentInput");
    const text = input.value.trim();
    if (!text) return;
    if (text.length > 500) { alert("コメントは500文字以内で入力してください"); return; }
    if (!currentUser) { openAuthModal(); return; }
    if (!videoDetailData) return;

    const btn = document.querySelector("#videoPageComments .commentSubmitBtn");
    btn.disabled = true;
    btn.textContent = "投稿中...";

    try {
        const res = await csrfFetch("/api/video/" + encodeURIComponent(videoDetailData.name) + "/comment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (data.success) {
            input.value = "";
            document.getElementById("videoCommentCounter").textContent = "0/500";
            const listEl = document.getElementById("videoCommentList");
            const emptyEl = listEl.querySelector(".commentEmpty");
            if (emptyEl) listEl.innerHTML = "";
            listEl.insertAdjacentHTML("beforeend",
                '<div class="commentItem">' +
                    '<div class="commentAuthor">' +
                        '<span>' + escapeHtml(data.comment.username) + '</span>' +
                        '<button class="commentDeleteBtn" onclick="deleteVideoPageComment(\'' + videoDetailData.name + "', '" + data.comment.id + "', this)\">削除</button>" +
                    '</div>' +
                    '<div class="commentText">' + escapeHtml(data.comment.text) + '</div>' +
                '</div>'
            );
        } else {
            alert(data.error || "エラーが発生しました");
        }
    } catch (e) {
        console.error(e);
        alert("通信エラーが発生しました");
    }
    btn.disabled = false;
    btn.textContent = "投稿";
}

async function deleteVideoPageComment(filename, id, btn) {
    if (!confirm("このコメントを削除しますか？")) return;
    try {
        const res = await csrfFetch("/api/video/" + encodeURIComponent(filename) + "/comment/" + id, { method: "DELETE" });
        const data = await res.json();
        if (data.success) { btn.closest(".commentItem").remove(); }
        else { alert(data.error || "エラーが発生しました"); }
    } catch (e) { console.error(e); alert("通信エラーが発生しました"); }
}

async function toggleVideoLike() {
    if (!videoDetailData) return;
    if (!currentUser) { openAuthModal(); return; }
    try {
        const res = await csrfFetch("/api/video/" + encodeURIComponent(videoDetailData.name) + "/like", { method: "POST" });
        const data = await res.json();
        if (data.success) {
            document.querySelector("#videoActions .likeBtn").classList.toggle("liked", data.liked);
            document.getElementById("videoLikeCount").textContent = data.likes;
            videoDetailData.likedByUser = data.liked;
            videoDetailData.likes = data.likes;
        }
    } catch (e) { console.error(e); }
}

async function toggleVideoBookmark() {
    if (!videoDetailData) return;
    if (!currentUser) { openAuthModal(); return; }
    try {
        const res = await csrfFetch("/api/video/" + encodeURIComponent(videoDetailData.name) + "/bookmark", { method: "POST" });
        const data = await res.json();
        if (data.success) {
            document.querySelector("#videoActions .bookmarkBtn").classList.toggle("bookmarked", data.bookmarked);
            videoDetailData.bookmarkedByUser = data.bookmarked;
        }
    } catch (e) { console.error(e); }
}

async function deleteVideoFromPage() {
    if (!videoDetailData) return;
    if (!confirm("この動画を削除しますか？")) return;
    try {
        const res = await csrfFetch("/api/video/" + encodeURIComponent(videoDetailData.name), { method: "DELETE" });
        const data = await res.json();
        if (data.success) { goBack(); }
        else { alert(data.error || "エラーが発生しました"); }
    } catch (e) { console.error(e); alert("通信エラーが発生しました"); }
}

function editVideoTitle() {
    if (!videoDetailData) return;
    const titleEl = document.getElementById("videoTitle");
    const current = titleEl.textContent;
    const input = document.createElement("input");
    input.type = "text";
    input.className = "titleInput";
    input.value = current;
    input.style.width = "100%";
    input.style.fontSize = "24px";
    input.style.fontWeight = "700";
    titleEl.textContent = "";
    titleEl.appendChild(input);
    input.focus();
    input.select();

    async function save() {
        const val = input.value.trim() || current;
        if (val.length > 100) { alert("タイトルは100文字以内で入力してください"); input.focus(); return; }
        await csrfFetch("/video/" + encodeURIComponent(videoDetailData.name), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: val })
        });
        titleEl.textContent = val;
        videoDetailData.title = val;
    }
    input.addEventListener("blur", save);
    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") input.blur();
        if (e.key === "Escape") titleEl.textContent = current;
    });
}

function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "/";
    }
}

function initRouting() {
    window.addEventListener("popstate", function(e) {
        const filename = getFilenameFromPath();
        if (filename) {
            showVideoByFilename(filename);
        } else {
            document.getElementById("videoPage").classList.remove("active");
            document.getElementById("videos").style.display = "";
            document.querySelector(".hero").style.display = "";
            document.getElementById("tabBar").style.display = "";
            const pag = document.getElementById("pagination");
            if (pag) pag.style.display = "";
            if (currentChannel) document.getElementById("channelHeader").style.display = "block";

            if (e.state && e.state.prevState) {
                const s = e.state.prevState;
                currentView = s.view || 'all';
                currentPage = s.page || 1;
                totalPages = s.totalPages || 1;
                currentChannel = s.channel || null;
                currentSearchQuery = s.searchQuery || '';
                currentPeriod = s.period || null;

                switch (currentView) {
                    case 'all': loadVideos(); break;
                    case 'channel': showChannel(currentChannel); break;
                    case 'search':
                        document.getElementById("searchInput").value = currentSearchQuery;
                        searchVideos();
                        break;
                    case 'ranking': showRanking(currentPeriod); break;
                    case 'bookmarks': showBookmarks(); break;
                }
                if (s.scrollY) setTimeout(() => window.scrollTo(0, s.scrollY), 50);
            } else {
                if (!document.getElementById("videos").children.length) {
                    showAllVideos();
                }
            }
        }
    });

    const filename = getFilenameFromPath();
    if (filename) {
        showVideoByFilename(filename);
    }
}

// Video page comment input events
document.addEventListener("DOMContentLoaded", function() {
    const commentInput = document.getElementById("videoCommentInput");
    const counterEl = document.getElementById("videoCommentCounter");
    if (commentInput) {
        commentInput.addEventListener("input", function() {
            counterEl.textContent = this.value.length + "/500";
            counterEl.classList.toggle("over", this.value.length >= 500);
        });
        commentInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                postVideoPageComment();
            }
        });
    }
});

checkAuth().then(() => {
    initRouting();
    if (!getFilenameFromPath()) {
        loadVideos();
    }
});
