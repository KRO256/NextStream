<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NextStream</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:"Inter",sans-serif;
    background:#0b0b0f;
    color:white;
}

/* =======================
   HEADER
======================= */

header{
    position:sticky;
    top:0;
    z-index:100;

    backdrop-filter:blur(18px);

    background:rgba(10,10,15,0.75);

    border-bottom:
    1px solid rgba(255,255,255,0.08);

    padding:16px 24px;

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
}

.logo{
    font-size:26px;
    font-weight:700;

    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.actions{
    display:flex;
    align-items:center;
    gap:12px;
}

.uploadBtn{
    background:linear-gradient(
        135deg,
        #7c4dff,
        #5b7cff
    );

    border:none;
    color:white;

    padding:12px 18px;

    border-radius:14px;

    font-weight:600;

    cursor:pointer;

    transition:0.2s;
}

.uploadBtn:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

.fileInput{
    display:none;
}

.customFile{
    background:#1a1a22;

    border:
    1px solid rgba(255,255,255,0.08);

    padding:12px 16px;

    border-radius:14px;

    cursor:pointer;

    transition:0.2s;
}

.customFile:hover{
    background:#22222c;
}

.titleInput{
    background:#1a1a22;

    border:
    1px solid rgba(255,255,255,0.08);

    padding:12px 16px;

    border-radius:14px;

    color:white;

    font-family:"Inter",sans-serif;

    font-size:14px;

    outline:none;

    transition:0.2s;

    min-width:200px;
}

.titleInput::placeholder{
    color:#6c6c82;
}

.titleInput:focus{
    border-color:#7c4dff;
}

.hero{
    padding:70px 24px 40px;
}

.heroTitle{
    font-size:52px;
    font-weight:800;

    line-height:1.05;

    max-width:850px;
}

.heroTitle span{
    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.heroSub{
    margin-top:20px;
    color:#a0a0b5;
    font-size:18px;
    max-width:700px;
}

/* =======================
   PROGRESS
======================= */

.progressWrap{
    margin-top:24px;
    width:100%;
    max-width:500px;
}

.progressBar{
    width:100%;
    height:14px;

    background:#1a1a22;

    border-radius:999px;

    overflow:hidden;
}

.progressFill{
    width:0%;
    height:100%;

    background:linear-gradient(
        90deg,
        #7c4dff,
        #00d4ff
    );

    transition:0.2s;
}

.progressText{
    margin-top:10px;
    color:#b8b8c7;
}

/* =======================
   GRID
======================= */

#videos{
    padding:10px 24px 60px;

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(340px,1fr));

    gap:28px;
}

/* =======================
   CARD
======================= */

.card{
    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.06);

    border-radius:24px;

    overflow:hidden;

    transition:0.25s;

    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-6px);

    border-color:
    rgba(124,77,255,0.5);

    box-shadow:
    0 20px 40px rgba(0,0,0,0.35);
}

.videoWrap{
    position:relative;
    aspect-ratio:16/9;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.cardBody{
    padding:18px;
}

.videoName{
    font-size:15px;
    font-weight:600;

    line-height:1.4;

    word-break:break-word;

    cursor:pointer;
}

.videoName:hover{
    color:#b8b8ff;
}

.videoMeta{
    margin-top:10px;
    color:#8c8ca3;
    font-size:13px;
}

.videoTags{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.tag{
    display:inline-block;
    background:rgba(124,77,255,0.15);
    color:#b8b8ff;
    font-size:11px;
    font-weight:500;
    padding:4px 10px;
    border-radius:999px;
    cursor:pointer;
    transition:0.2s;
}

.tag:hover{
    background:rgba(124,77,255,0.3);
}

.tag.addTag{
    background:rgba(255,255,255,0.06);
    color:#8c8ca3;
    font-size:11px;
}

.tag.addTag:hover{
    background:rgba(255,255,255,0.12);
    color:#ccc;
}

.tagEditInput{
    background:#1a1a22;
    border:1px solid rgba(255,255,255,0.08);
    padding:4px 10px;
    border-radius:999px;
    color:white;
    font-family:"Inter",sans-serif;
    font-size:11px;
    outline:none;
    width:160px;
    transition:0.2s;
}

.tagEditInput:focus{
    border-color:#7c4dff;
}

.empty{
    padding:80px 20px;
    text-align:center;
    color:#88889c;
    font-size:18px;
}

@media(max-width:850px){

    .heroTitle{
        font-size:38px;
    }

    header{
        flex-direction:column;
        align-items:flex-start;
    }

    .actions{
        width:100%;
        flex-wrap:wrap;
    }

    .uploadBtn{
        width:100%;
    }

    .customFile{
        width:100%;
    }

    .titleInput{
        width:100%;
        min-width:0;
    }
}

</style>
</head>
<body>

<header>

<div class="logo">
NextStream
</div>

<div class="actions">

<input
type="text"
id="searchInput"
class="titleInput"
placeholder="タグで検索">

<button
id="searchBtn"
class="uploadBtn"
onclick="searchVideos()">

検索

</button>

<button
id="clearSearchBtn"
class="uploadBtn"
style="display:none;background:linear-gradient(135deg,#555,#777)"
onclick="clearSearch()">

× クリア

</button>

<a
href="/upload.html"
class="uploadBtn"
style="text-decoration:none;">

＋ アップロード

</a>

</div>

</header>

<section class="hero">

<div class="heroTitle">

次世代の
<span>動画共有</span>
プラットフォーム

</div>

<div class="heroSub">

Node.jsだけで動く、
モダンUIのシンプルな動画投稿サイト

</div>

</section>

<div id="videos"></div>

<script>

function startEditTitle(el) {

    const filename =
    el.dataset.filename;

    const current =
    el.textContent;

    const input =
    document.createElement("input");

    input.type = "text";

    input.className = "titleInput";

    input.style.width = "100%";

    input.style.padding = "6px 10px";

    input.style.fontSize = "15px";

    input.style.fontWeight = "600";

    input.value = current;

    el.textContent = "";

    el.appendChild(input);

    input.focus();

    input.select();

    async function save() {

        const val =
        input.value.trim() || current;

        if (val.length > 100) {
            alert("タイトルは100文字以内で入力してください");
            input.focus();
            return;
        }

        await fetch(
            "/video/" +
            encodeURIComponent(filename),
            {
                method:"PATCH",
                headers:{
                    "Content-Type":
                    "application/json"
                },
                body:JSON.stringify({
                    title:val
                })
            }
        );

        el.textContent = val;
    }

    input.addEventListener("blur", save);

    input.addEventListener(
        "keydown",
        function(e) {
            if (e.key === "Enter") {
                input.blur();
            }

            if (e.key === "Escape") {
                el.textContent = current;
            }
        }
    );
}

function startEditTags(el) {

    const filename =
    el.dataset.filename;

    const current =
    el.querySelector(".tag.addTag")
        ? []
        : [...el.querySelectorAll(".tag:not(.addTag)")].map(
            t => t.dataset.tag
        );

    const input =
    document.createElement("input");

    input.type = "text";

    input.className = "tagEditInput";

    input.value = current.join(", ");

    input.placeholder = "タグをカンマ区切り";

    el.innerHTML = "";

    el.appendChild(input);

    input.focus();

    input.select();

    async function save() {

        const val =
        input.value.trim();

        const tagList = val
            ? val.split(",").map(t => t.trim()).filter(Boolean)
            : [];

        if (tagList.some(t => t.length > 20)) {
            alert("各タグは20文字以内で入力してください");
            input.focus();
            return;
        }
        if (tagList.length > 10) {
            alert("タグは最大10個までです");
            input.focus();
            return;
        }

        await fetch(
            "/video/" +
            encodeURIComponent(filename),
            {
                method:"PATCH",
                headers:{
                    "Content-Type":
                    "application/json"
                },
                body:JSON.stringify({
                    tags:tagList
                })
            }
        );

        if (tagList.length) {
            el.innerHTML = tagList.map(t =>
                `<span class="tag" data-tag="${t}">${t}</span>`
            ).join("");
        } else {
            el.innerHTML =
            `<span class="tag addTag">+ タグ追加</span>`;
        }
    }

    input.addEventListener("blur", save);

    input.addEventListener(
        "keydown",
        function(e) {
            if (e.key === "Enter") {
                input.blur();
            }

            if (e.key === "Escape") {
                const currentTags = current.join(", ");
                if (currentTags) {
                    el.innerHTML = current.map(t =>
                        `<span class="tag" data-tag="${t}">${t}</span>`
                    ).join("");
                } else {
                    el.innerHTML =
                    `<span class="tag addTag">+ タグ追加</span>`;
                }
            }
        }
    );
}

async function searchVideos() {

    const q =
    document.getElementById("searchInput").value.trim();

    if (!q) {

        loadVideos();

        return;
    }

    const res =
    await fetch("/search?q=" + encodeURIComponent(q));

    const videos =
    await res.json();

    document.getElementById("searchBtn").style.display = "none";
    document.getElementById("clearSearchBtn").style.display = "";

    const container =
    document.getElementById("videos");

    container.innerHTML = "";

    if (videos.length === 0) {

        container.innerHTML = `
        <div class="empty">
            「${q}」に一致する動画はありません
        </div>
        `;

        return;
    }

    videos.forEach(video => {

        const div =
        document.createElement("div");

        div.className = "card";

        const tagsHtml = (video.tags || []).length
            ? `<div class="videoTags" data-filename="${video.name}">${
                video.tags.map(t =>
                    `<span class="tag" data-tag="${t}">${t}</span>`
                ).join("")
            }</div>`
            : `<div class="videoTags" data-filename="${video.name}"><span class="tag addTag">+ タグ追加</span></div>`;

        div.innerHTML = `

        <div class="videoWrap">

            <video
            controls
            preload="metadata"
            src="${video.url}">
            </video>

        </div>

        <div class="cardBody">

            <div class="videoName" data-filename="${video.name}">
                ${video.title}
            </div>

            ${tagsHtml}

            <div class="videoMeta">
                NextStream
            </div>

        </div>

        `;

        const titleEl =
        div.querySelector(".videoName");

        titleEl.addEventListener(
            "click",
            function() {
                startEditTitle(this);
            }
        );

        const tagsEl =
        div.querySelector(".videoTags");

        tagsEl.addEventListener(
            "click",
            function(e) {
                if (e.target.classList.contains("tag") && !e.target.classList.contains("addTag")) {
                    return;
                }
                startEditTags(this);
            }
        );

        container.appendChild(div);
    });
}

function clearSearch() {

    document.getElementById("searchInput").value = "";

    document.getElementById("searchBtn").style.display = "";
    document.getElementById("clearSearchBtn").style.display = "none";

    loadVideos();
}

async function loadVideos() {

    const res =
    await fetch("/list");

    const videos =
    await res.json();

    const container =
    document.getElementById("videos");

    container.innerHTML = "";

    if (videos.length === 0) {

        container.innerHTML = `
        <div class="empty">
            まだ動画がありません
        </div>
        `;

        return;
    }

    videos.forEach(video => {

        const div =
        document.createElement("div");

        div.className = "card";

        const tagsHtml = (video.tags || []).length
            ? `<div class="videoTags" data-filename="${video.name}">${
                video.tags.map(t =>
                    `<span class="tag" data-tag="${t}">${t}</span>`
                ).join("")
            }</div>`
            : `<div class="videoTags" data-filename="${video.name}"><span class="tag addTag">+ タグ追加</span></div>`;

        div.innerHTML = `

        <div class="videoWrap">

            <video
            controls
            preload="metadata"
            src="${video.url}">
            </video>

        </div>

        <div class="cardBody">

            <div class="videoName" data-filename="${video.name}">
                ${video.title}
            </div>

            ${tagsHtml}

            <div class="videoMeta">
                NextStream
            </div>

        </div>

        `;

        const titleEl =
        div.querySelector(".videoName");

        titleEl.addEventListener(
            "click",
            function() {
                startEditTitle(this);
            }
        );

        const tagsEl =
        div.querySelector(".videoTags");

        tagsEl.addEventListener(
            "click",
            function(e) {
                if (e.target.classList.contains("tag") && !e.target.classList.contains("addTag")) {
                    return;
                }
                startEditTags(this);
            }
        );

        container.appendChild(div);
    });
}

loadVideos();

</script>

</body>
</html>
