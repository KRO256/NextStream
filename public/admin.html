<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理画面 - NextStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
    margin:0;font-family:"Inter",sans-serif;
    background:#0b0b0f;color:white;
}
header{
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(18px);
    background:rgba(10,10,15,0.75);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.logo{
    font-size:22px;font-weight:700;
    background:linear-gradient(90deg,#7c4dff,#00d4ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    cursor:pointer;text-decoration:none;
}
.backBtn{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    color:#a0a0b5;padding:8px 18px;border-radius:999px;
    font-size:14px;font-weight:500;cursor:pointer;
    transition:0.2s;font-family:"Inter",sans-serif;text-decoration:none;
}
.backBtn:hover{background:rgba(124,77,255,0.15);border-color:rgba(124,77,255,0.3);color:white}
.container{max-width:1200px;margin:0 auto;padding:24px}
h1{font-size:28px;font-weight:700;margin:0 0 4px}
.subtitle{color:#8c8ca3;font-size:14px;margin-bottom:24px}
.tabBar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    color:#a0a0b5;padding:10px 20px;border-radius:999px;
    font-size:14px;font-weight:500;cursor:pointer;
    transition:0.2s;font-family:"Inter",sans-serif;
}
.tab:hover{background:rgba(124,77,255,0.15);border-color:rgba(124,77,255,0.3);color:white}
.tab.active{background:linear-gradient(135deg,#7c4dff,#5b7cff);border-color:transparent;color:white}
.stats{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.statCard{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:16px;padding:16px 24px;flex:1;min-width:140px;
}
.statCard .num{font-size:28px;font-weight:700;color:#7c4dff}
.statCard .label{font-size:13px;color:#8c8ca3;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{
    text-align:left;padding:10px 12px;
    color:#8c8ca3;font-weight:600;font-size:12px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    text-transform:uppercase;letter-spacing:0.5px;
}
td{
    padding:12px;border-bottom:1px solid rgba(255,255,255,0.04);
    vertical-align:middle;
}
tr:hover td{background:rgba(124,77,255,0.04)}
.adminBadge{
    display:inline-block;background:linear-gradient(135deg,#ffd700,#ffaa00);
    color:#1a1a2e;font-size:10px;font-weight:700;padding:2px 8px;
    border-radius:999px;margin-left:6px;vertical-align:middle;
}
.deleteBtn{
    background:rgba(229,57,53,0.15);
    border:1px solid rgba(229,57,53,0.3);
    color:#ef5350;padding:6px 14px;border-radius:8px;
    font-size:12px;font-weight:500;cursor:pointer;
    transition:0.2s;font-family:"Inter",sans-serif;white-space:nowrap;
}
.deleteBtn:hover{background:rgba(229,57,53,0.3);border-color:#e53935}
.deleteBtn:disabled{opacity:0.4;cursor:not-allowed}
.selfRow{opacity:0.5}
.adminRow td{color:#ffd700}
.empty{text-align:center;padding:60px 20px;color:#6c6c82;font-size:15px}
.panel{display:none}
.panel.active{display:block}
.badge{
    display:inline-block;background:rgba(124,77,255,0.15);
    color:#b8b8ff;font-size:11px;padding:2px 10px;border-radius:999px;
}
.modalOverlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,0.7);z-index:200;
    align-items:center;justify-content:center;
}
.modalOverlay.active{display:flex}
.modal{
    background:#16161e;border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;padding:32px;width:100%;max-width:420px;
}
.modal h2{margin:0 0 8px;font-size:22px}
.modal p{color:#a0a0b5;font-size:14px;margin:0 0 20px;line-height:1.5}
.modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.btnSecondary{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    color:white;padding:10px 20px;border-radius:12px;
    font-size:14px;font-weight:500;cursor:pointer;
    transition:0.2s;font-family:"Inter",sans-serif;
}
.btnSecondary:hover{background:rgba(255,255,255,0.12)}
.btnDanger{
    background:linear-gradient(135deg,#e53935,#c62828);
    border:none;color:white;padding:10px 20px;border-radius:12px;
    font-size:14px;font-weight:600;cursor:pointer;
    transition:0.2s;font-family:"Inter",sans-serif;
}
.btnDanger:hover{opacity:0.9}
.searchBar{
    display:flex;gap:8px;margin-bottom:16px;
}
.searchInput{
    background:#1a1a22;border:1px solid rgba(255,255,255,0.08);
    padding:10px 14px;border-radius:12px;color:white;
    font-family:"Inter",sans-serif;font-size:14px;outline:none;
    flex:1;max-width:320px;transition:0.2s;
}
.searchInput:focus{border-color:#7c4dff}
@media(max-width:900px){
    .stats{gap:12px}
    .statCard{min-width:120px}
}
@media(max-width:700px){
    .container{padding:16px}
    table{font-size:12px}
    th,td{padding:8px}
    .statCard{padding:12px 16px;min-width:100px}
    .statCard .num{font-size:22px}
    header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }
    header > div{
        width:100%;
        justify-content:space-between;
    }
    .tabBar{gap:4px}
    .tab{font-size:12px;padding:8px 14px}
    .searchBar{flex-direction:column}
    .searchInput{max-width:none;width:100%}
    h1{font-size:22px}
}
@media(max-width:500px){
    .container{padding:12px}
    h1{font-size:20px}
    .subtitle{font-size:13px}
    .stats{gap:8px}
    .statCard{padding:10px 12px;min-width:calc(50% - 8px);flex:1 1 calc(50% - 8px)}
    .statCard .num{font-size:20px}
    .statCard .label{font-size:11px}
    .tab{font-size:11px;padding:6px 10px}
    .tabBar{gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
    .tabBar::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;white-space:nowrap}

    /* Convert tables to cards */
    .panel table, .panel thead, .panel tbody, .panel th, .panel td, .panel tr{
        display:block;
    }
    .panel thead{
        display:none;
    }
    .panel table tr{
        background:rgba(255,255,255,0.04);
        border:1px solid rgba(255,255,255,0.06);
        border-radius:14px;
        padding:14px;
        margin-bottom:12px;
    }
    .panel table tr:hover td{
        background:transparent;
    }
    .panel table td{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:8px;
        border-bottom:1px solid rgba(255,255,255,0.04);
        padding:8px 0;
    }
    .panel table td:last-child{
        border-bottom:none;
        padding-bottom:0;
    }
    .panel table td::before{
        content:attr(data-label);
        font-size:11px;
        font-weight:600;
        color:#6c6c82;
        text-transform:uppercase;
        letter-spacing:0.3px;
        flex-shrink:0;
    }
    .panel table td > *{
        text-align:right;
    }
    .panel table td .commentPreview{
        max-width:180px;
    }
    .modal{
        margin:16px;
        padding:24px 20px;
        max-width:none;
        width:auto;
    }
    .btnSecondary, .btnDanger{
        padding:8px 16px;
        font-size:13px;
    }
    .backBtn{font-size:12px;padding:6px 14px}
    .logo{font-size:18px}
}
.commentPreview{color:#a0a0b5;font-size:13px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.userCell{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.loading{text-align:center;padding:60px;color:#6c6c82}
</style>
</head>
<body>
<header>
    <a href="/" class="logo">NextStream</a>
    <div style="display:flex;align-items:center;gap:10px">
        <span id="headerUser" style="color:#b8b8ff;font-size:14px;font-weight:500"></span>
        <a href="/" class="backBtn">← サイトに戻る</a>
    </div>
</header>

<div class="container">
    <h1>管理画面</h1>
    <div class="subtitle" id="greeting"></div>

    <div class="stats" id="stats"></div>

    <div class="tabBar">
        <button class="tab active" data-panel="videos" onclick="switchPanel('videos')">動画</button>
        <button class="tab" data-panel="users" onclick="switchPanel('users')">ユーザー</button>
        <button class="tab" data-panel="comments" onclick="switchPanel('comments')">コメント</button>
        <button class="tab" data-panel="reports" onclick="switchPanel('reports')">通報</button>
    </div>

    <div class="searchBar">
        <input type="text" class="searchInput" id="searchInput" placeholder="検索..." oninput="filterCurrentPanel()">
    </div>

    <div class="panel active" id="panel-videos"></div>
    <div class="panel" id="panel-users"></div>
    <div class="panel" id="panel-comments"></div>
    <div class="panel" id="panel-reports"></div>
</div>

<div class="modalOverlay" id="confirmModal">
    <div class="modal">
        <h2 id="confirmTitle">確認</h2>
        <p id="confirmMessage">この操作を実行しますか？</p>
        <div class="actions">
            <button class="btnSecondary" onclick="closeConfirm()">キャンセル</button>
            <button class="btnDanger" id="confirmBtn" onclick="executeConfirm()">削除する</button>
        </div>
    </div>
</div>

<div class="modalOverlay" id="errorModal">
    <div class="modal">
        <h2 style="color:#ef5350">エラー</h2>
        <p id="errorMessage" style="color:#a0a0b5"></p>
        <div class="actions">
            <button class="btnSecondary" onclick="closeError()">閉じる</button>
        </div>
    </div>
</div>

<script>
let csrfToken = null;
let currentUser = null;
let currentPanel = 'videos';
let adminData = { users: [], videos: [], comments: [], reports: [] };
let pendingAction = null;

async function init() {
    const meRes = await fetch("/api/me");
    const meData = await meRes.json();
    csrfToken = meData.csrfToken;

    if (!meData.success || !meData.isAdmin) {
        window.location.href = "/";
        return;
    }

    currentUser = meData.user;
    document.getElementById("headerUser").textContent = currentUser;
    document.getElementById("greeting").textContent = "管理者としてログイン中";

    await loadData();
}

function csrfFetch(url, options = {}) {
    const method = (options.method || "GET").toUpperCase();
    if (["POST","PUT","PATCH","DELETE"].includes(method) && csrfToken) {
        options.headers = { ...options.headers, "X-CSRF-Token": csrfToken };
    }
    return fetch(url, options);
}

async function loadData() {
    document.getElementById("panel-videos").innerHTML = '<div class="loading">読み込み中...</div>';
    document.getElementById("panel-users").innerHTML = '<div class="loading">読み込み中...</div>';
    document.getElementById("panel-comments").innerHTML = '<div class="loading">読み込み中...</div>';
    document.getElementById("panel-reports").innerHTML = '<div class="loading">読み込み中...</div>';

    try {
        const [videosRes, usersRes, commentsRes, reportsRes] = await Promise.all([
            csrfFetch("/api/admin/videos"),
            csrfFetch("/api/admin/users"),
            csrfFetch("/api/admin/comments"),
            csrfFetch("/api/admin/reports")
        ]);

        const videosData = await videosRes.json();
        const usersData = await usersRes.json();
        const commentsData = await commentsRes.json();
        const reportsData = await reportsRes.json();

        if (videosData.success) adminData.videos = videosData.videos;
        if (usersData.success) adminData.users = usersData.users;
        if (commentsData.success) adminData.comments = commentsData.comments;
        if (reportsData.success) adminData.reports = reportsData.reports;

        renderStats();
        renderVideos();
        renderUsers();
        renderComments();
        renderReports();
    } catch (e) {
        console.error(e);
        document.getElementById("panel-videos").innerHTML =
            '<div class="empty">データの読み込みに失敗しました</div>';
    }
}

function renderStats() {
    document.getElementById("stats").innerHTML = `
        <div class="statCard">
            <div class="num">${adminData.videos.length}</div>
            <div class="label">動画</div>
        </div>
        <div class="statCard">
            <div class="num">${adminData.users.length}</div>
            <div class="label">ユーザー</div>
        </div>
        <div class="statCard">
            <div class="num">${adminData.comments.length}</div>
            <div class="label">コメント</div>
        </div>
        <div class="statCard">
            <div class="num">${adminData.reports.length}</div>
            <div class="label">通報</div>
        </div>
    `;
}

function switchPanel(panel) {
    currentPanel = panel;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelector(`.tab[data-panel="${panel}"]`).classList.add("active");
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById("panel-" + panel).classList.add("active");
    document.getElementById("searchInput").value = "";
    filterCurrentPanel();
}

function filterCurrentPanel() {
    const q = document.getElementById("searchInput").value.toLowerCase().trim();
    switch (currentPanel) {
        case "videos": renderVideos(q); break;
        case "users": renderUsers(q); break;
        case "comments": renderComments(q); break;
        case "reports": renderReports(q); break;
    }
}

function renderVideos(filter) {
    const el = document.getElementById("panel-videos");
    let list = adminData.videos;
    if (filter) {
        list = list.filter(v =>
            v.title.toLowerCase().includes(filter) ||
            v.name.toLowerCase().includes(filter) ||
            (v.uploadedBy && v.uploadedBy.toLowerCase().includes(filter))
        );
    }
    if (!list.length) {
        el.innerHTML = '<div class="empty">動画がありません</div>';
        return;
    }
    el.innerHTML = `
        <table>
            <thead><tr>
                <th>タイトル</th>
                <th>アップロード者</th>
                <th>再生回数</th>
                <th>いいね</th>
                <th>コメント</th>
                <th></th>
            </tr></thead>
            <tbody>${list.map(v => `
                <tr>
                    <td data-label="タイトル" style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                        <span title="${escapeHtml(v.title)}">${escapeHtml(v.title)}</span>
                    </td>
                    <td data-label="アップロード者">${v.uploadedBy ? escapeHtml(v.uploadedBy) : '<span style="color:#6c6c82">—</span>'}</td>
                    <td data-label="再生回数">${v.views.toLocaleString()}</td>
                    <td data-label="いいね">${v.likes.toLocaleString()}</td>
                    <td data-label="コメント">${v.commentCount}</td>
                    <td data-label=""><button class="deleteBtn" onclick="confirmDeleteVideo('${escapeJs(v.name)}')">削除</button></td>
                </tr>
            `).join("")}</tbody>
        </table>
    `;
}

function renderUsers(filter) {
    const el = document.getElementById("panel-users");
    let list = adminData.users;
    if (filter) {
        list = list.filter(u => u.username.toLowerCase().includes(filter));
    }
    if (!list.length) {
        el.innerHTML = '<div class="empty">ユーザーがありません</div>';
        return;
    }
    el.innerHTML = `
        <table>
            <thead><tr>
                <th>ユーザー名</th>
                <th>登録日</th>
                <th>動画数</th>
                <th>コメント数</th>
                <th></th>
            </tr></thead>
            <tbody>${list.map(u => {
                const isSelf = u.username === currentUser;
                const rowClass = isSelf ? 'selfRow' : (u.admin ? 'adminRow' : '');
                return `
                <tr class="${rowClass}">
                    <td data-label="ユーザー名">
                        <div class="userCell">
                            ${escapeHtml(u.username)}
                            ${u.admin ? '<span class="adminBadge">ADMIN</span>' : ''}
                            ${isSelf ? '<span style="color:#6c6c82;font-size:11px">（自分）</span>' : ''}
                        </div>
                    </td>
                    <td data-label="登録日" style="color:#8c8ca3;font-size:13px">${new Date(u.createdAt).toLocaleDateString("ja-JP")}</td>
                    <td data-label="動画数">${u.videoCount}</td>
                    <td data-label="コメント数">${u.commentCount}</td>
                    <td data-label="">${!isSelf && !u.admin ? `<button class="deleteBtn" onclick="confirmDeleteUser('${escapeJs(u.username)}')">削除</button>` : ''}</td>
                </tr>
            `}).join("")}</tbody>
        </table>
    `;
}

function renderComments(filter) {
    const el = document.getElementById("panel-comments");
    let list = adminData.comments;
    if (filter) {
        list = list.filter(c =>
            c.text.toLowerCase().includes(filter) ||
            c.username.toLowerCase().includes(filter) ||
            c.videoTitle.toLowerCase().includes(filter)
        );
    }
    if (!list.length) {
        el.innerHTML = '<div class="empty">コメントがありません</div>';
        return;
    }
    el.innerHTML = `
        <table>
            <thead><tr>
                <th>投稿者</th>
                <th>コメント</th>
                <th>動画</th>
                <th>日時</th>
                <th></th>
            </tr></thead>
            <tbody>${list.map(c => `
                <tr>
                    <td data-label="投稿者"><span style="color:#b8b8ff;font-weight:500">${escapeHtml(c.username)}</span></td>
                    <td data-label="コメント"><span class="commentPreview" title="${escapeHtml(c.text)}">${escapeHtml(c.text)}</span></td>
                    <td data-label="動画" style="color:#8c8ca3;font-size:13px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                        ${escapeHtml(c.videoTitle)}
                    </td>
                    <td data-label="日時" style="color:#6c6c82;font-size:12px;white-space:nowrap">${new Date(c.createdAt).toLocaleString("ja-JP")}</td>
                    <td data-label=""><button class="deleteBtn" onclick="confirmDeleteComment('${escapeJs(c.filename)}', '${escapeJs(c.id)}')">削除</button></td>
                </tr>
            `).join("")}</tbody>
        </table>
    `;
}

// Confirmation dialogs
function showConfirm(title, message, action) {
    pendingAction = action;
    document.getElementById("confirmTitle").textContent = title;
    document.getElementById("confirmMessage").textContent = message;
    document.getElementById("confirmModal").classList.add("active");
}

function closeConfirm() {
    pendingAction = null;
    document.getElementById("confirmModal").classList.remove("active");
}

async function executeConfirm() {
    if (!pendingAction) return;
    const btn = document.getElementById("confirmBtn");
    btn.disabled = true;
    btn.textContent = "実行中...";
    try {
        await pendingAction();
    } finally {
        btn.disabled = false;
        btn.textContent = "削除する";
        closeConfirm();
    }
}

function showError(msg) {
    document.getElementById("errorMessage").textContent = msg;
    document.getElementById("errorModal").classList.add("active");
}

function closeError() {
    document.getElementById("errorModal").classList.remove("active");
}

// Delete handlers
function confirmDeleteVideo(filename) {
    const video = adminData.videos.find(v => v.name === filename);
    const title = video ? video.title : filename;
    showConfirm(
        "動画を削除",
        `「${title}」を削除します。この操作は取り消せません。`,
        async () => {
            const res = await csrfFetch("/api/admin/video/" + encodeURIComponent(filename), { method: "DELETE" });
            const data = await res.json();
            if (data.success) {
                adminData.videos = adminData.videos.filter(v => v.name !== filename);
                adminData.comments = adminData.comments.filter(c => c.filename !== filename);
                renderStats();
                filterCurrentPanel();
            } else {
                showError(data.error || "削除に失敗しました");
            }
        }
    );
}

function confirmDeleteUser(username) {
    showConfirm(
        "ユーザーを削除",
        `「${username}」を削除します。このユーザーの全動画・コメント・データが削除されます。この操作は取り消せません。`,
        async () => {
            const res = await csrfFetch("/api/admin/user/" + encodeURIComponent(username), { method: "DELETE" });
            const data = await res.json();
            if (data.success) {
                adminData.users = adminData.users.filter(u => u.username !== username);
                adminData.videos = adminData.videos.filter(v => v.uploadedBy !== username);
                adminData.comments = adminData.comments.filter(c => c.username !== username);
                renderStats();
                filterCurrentPanel();
            } else {
                showError(data.error || "削除に失敗しました");
            }
        }
    );
}

function confirmDeleteComment(filename, id) {
    showConfirm(
        "コメントを削除",
        "このコメントを削除します。この操作は取り消せません。",
        async () => {
            const res = await csrfFetch(
                "/api/admin/video/" + encodeURIComponent(filename) + "/comment/" + encodeURIComponent(id),
                { method: "DELETE" }
            );
            const data = await res.json();
            if (data.success) {
                adminData.comments = adminData.comments.filter(c => !(c.filename === filename && c.id === id));
                renderStats();
                filterCurrentPanel();
            } else {
                showError(data.error || "削除に失敗しました");
            }
        }
    );
}

function renderReports(filter) {
    const el = document.getElementById("panel-reports");
    let list = adminData.reports;
    if (filter) {
        list = list.filter(r =>
            r.videoTitle.toLowerCase().includes(filter) ||
            r.reportedBy.toLowerCase().includes(filter) ||
            r.reason.toLowerCase().includes(filter) ||
            (r.details && r.details.toLowerCase().includes(filter))
        );
    }
    if (!list.length) {
        el.innerHTML = '<div class="empty">通報はありません</div>';
        return;
    }
    const reasonLabels = {
        spam: "スパム・宣伝",
        inappropriate: "不適切な内容",
        copyright: "著作権侵害",
        harassment: "嫌がらせ・迷惑行為",
        other: "その他"
    };
    el.innerHTML = `
        <table>
            <thead><tr>
                <th>通報者</th>
                <th>動画</th>
                <th>理由</th>
                <th>詳細</th>
                <th>日時</th>
                <th></th>
            </tr></thead>
            <tbody>${list.map(r => `
                <tr>
                    <td data-label="通報者"><span style="color:#b8b8ff;font-weight:500">${escapeHtml(r.reportedBy)}</span></td>
                    <td data-label="動画" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(r.videoTitle)}</td>
                    <td data-label="理由"><span class="badge">${reasonLabels[r.reason] || r.reason}</span></td>
                    <td data-label="詳細" style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#a0a0b5;font-size:13px">${r.details ? escapeHtml(r.details) : '<span style="color:#6c6c82">—</span>'}</td>
                    <td data-label="日時" style="color:#6c6c82;font-size:12px;white-space:nowrap">${new Date(r.createdAt).toLocaleString("ja-JP")}</td>
                    <td data-label=""><button class="deleteBtn" onclick="confirmDismissReport('${escapeJs(r.id)}')">却下</button></td>
                </tr>
            `).join("")}</tbody>
        </table>
    `;
}

function confirmDismissReport(id) {
    showConfirm(
        "通報を却下",
        "この通報を却下しますか？動画は削除されません。",
        async () => {
            const res = await csrfFetch("/api/admin/report/" + encodeURIComponent(id), { method: "DELETE" });
            const data = await res.json();
            if (data.success) {
                adminData.reports = adminData.reports.filter(r => r.id !== id);
                renderStats();
                filterCurrentPanel();
            } else {
                showError(data.error || "処理に失敗しました");
            }
        }
    );
}

function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
}
function escapeJs(str) {
    return String(str).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "\\\"").replace(/</g, "\\x3C").replace(/>/g, "\\x3E");
}

init();
</script>
</body>
</html>
